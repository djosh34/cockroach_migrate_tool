apiVersion: v1
kind: Service
metadata:
  name: {{ include "verify-container.fullname" . }}
  labels:
    {{- include "verify-container.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "verify-container.selectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: {{ .Values.service.port }}
      targetPort: https
      protocol: TCP
