listener:
  bind_addr: 0.0.0.0:8080
  transport:
    mode: http
  tls:
    client_auth:
      # Direct service auth is intentionally disabled here; deploy behind an authenticated proxy if you use this mode.
      mode: none
verify:
  source:
    url: postgresql://verify_source@source.internal:5432/appdb
    tls:
      mode: verify-full
      ca_cert_path: /config/certs/source-ca.crt
      client_cert_path: /config/certs/source-client.crt
      client_key_path: /config/certs/source-client.key
  destination:
    url: postgresql://verify_target:secret@crdb.internal:26257/appdb
    tls:
      mode: verify-ca
      ca_cert_path: /config/certs/destination-ca.crt
