listener:
  bind_addr: 0.0.0.0:8080
verify:
  source:
    host: source.internal
    port: 5432
    user: verify_source
    sslmode: verify-full
    ca_cert_path: /config/certs/source-ca.crt
  destination:
    host: crdb.internal
    port: 26257
    user: verify_target
    sslmode: verify-ca
    client_cert_path: /config/certs/destination-client.crt
  databases:
    - name: app
      source_database: appdb
      destination_database: appdb
