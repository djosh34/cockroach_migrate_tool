name: promote-image-tags

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version tag to publish to GHCR
        required: true
        type: string
      set_latest:
        description: Also publish the GHCR latest tag
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  GHCR_REGISTRY: ghcr.io

jobs:
  image-catalog:
    uses: ./.github/workflows/image-catalog.yml

  promote-release-tags:
    needs: image-catalog
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      packages: write
    env:
      IMAGE_CATALOG_JSON: ${{ needs.image-catalog.outputs.release_image_catalog }}
      REQUESTED_VERSION: ${{ inputs.version }}
      SET_LATEST: ${{ inputs.set_latest }}
    steps:
      - name: Validate dispatch ref
        run: |
          set -euo pipefail
          test "${GITHUB_REF}" = "refs/heads/master"

      - name: Install promotion dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes jq skopeo

      - name: Validate promotion inputs
        run: |
          set -euo pipefail
          version="${REQUESTED_VERSION}"
          : "${version:?missing required version input}"
          if [[ "${version}" == "latest" ]]; then
            printf 'version input must not be latest because set_latest controls that tag\n' >&2
            exit 1
          fi
          if [[ ! "${version}" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*$ ]]; then
            printf 'version input must match ^[A-Za-z0-9][A-Za-z0-9._-]*$: %s\n' "${version}" >&2
            exit 1
          fi
          case "${SET_LATEST}" in
            true|false)
              ;;
            *)
              printf 'set_latest must resolve to true or false, got %s\n' "${SET_LATEST}" >&2
              exit 1
              ;;
          esac

      - name: Mask derived GHCR publish credentials
        env:
          GHCR_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          derived_registry_auth="$(printf '%s' "${GITHUB_ACTOR}:${GHCR_PASSWORD}" | base64 -w0)"
          echo "::add-mask::${derived_registry_auth}"
          printf 'GHCR publish auth (masked): %s\n' "${derived_registry_auth}"

      - name: Login to GHCR
        env:
          GHCR_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "${GHCR_PASSWORD}" | docker login "${{ env.GHCR_REGISTRY }}" --username "${{ github.actor }}" --password-stdin

      - name: Resolve latest successful published source SHA
        id: resolve-source-sha
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          runs_api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/publish-images.yml/runs?branch=master&status=success&event=push&per_page=1"
          runs_json="$(curl --fail --silent --show-error \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${runs_api}")"
          source_sha="$(jq -r '.workflow_runs[0].head_sha // empty' <<< "${runs_json}")"
          if [[ -z "${source_sha}" ]]; then
            printf 'no successful publish-images push run exists on master, so there is no truthful GHCR source_sha to promote\n' >&2
            exit 1
          fi
          printf 'source_sha=%s\n' "${source_sha}" >> "${GITHUB_OUTPUT}"

      - name: Promote published GHCR images
        run: |
          set -euo pipefail
          source_sha="${{ steps.resolve-source-sha.outputs.source_sha }}"
          : "${source_sha:?missing resolved source_sha}"

          promote_tag() {
            local source_ref="$1"
            local target_ref="$2"
            skopeo inspect --authfile "${HOME}/.docker/config.json" "docker://${source_ref}" >/dev/null
            skopeo copy \
              --all \
              --src-authfile "${HOME}/.docker/config.json" \
              --dest-authfile "${HOME}/.docker/config.json" \
              "docker://${source_ref}" \
              "docker://${target_ref}"
            skopeo inspect --authfile "${HOME}/.docker/config.json" "docker://${target_ref}" >/dev/null
          }

          jq -e 'length > 0' <<< "${IMAGE_CATALOG_JSON}" >/dev/null

          {
            echo "## GHCR Release Promotion"
            echo
            printf -- '- Source publish SHA: `%s`\n' "${source_sha}"
            echo
            echo "| Image | Source commit tag | Version tag | Latest tag |"
            echo "| --- | --- | --- | --- |"
          } >> "${GITHUB_STEP_SUMMARY}"

          while IFS= read -r image_target; do
            image_id="$(jq -r '.image_id' <<< "${image_target}")"
            ghcr_repository="$(jq -r '.ghcr_repository' <<< "${image_target}")"
            : "${image_id:?missing image_id in image catalog}"
            : "${ghcr_repository:?missing ghcr_repository in image catalog}"
            source_ref="${GHCR_REGISTRY}/${{ github.repository_owner }}/${ghcr_repository}:${source_sha}"
            version_ref="${GHCR_REGISTRY}/${{ github.repository_owner }}/${ghcr_repository}:${REQUESTED_VERSION}"

            promote_tag "${source_ref}" "${version_ref}"

            latest_summary="not requested"
            if [[ "${SET_LATEST}" == "true" ]]; then
              latest_ref="${GHCR_REGISTRY}/${{ github.repository_owner }}/${ghcr_repository}:latest"
              promote_tag "${source_ref}" "${latest_ref}"
              latest_summary="\`${latest_ref}\`"
            fi

            printf '| `%s` | `%s` | `%s` | %s |\n' \
              "${image_id}" \
              "${source_ref}" \
              "${version_ref}" \
              "${latest_summary}" >> "${GITHUB_STEP_SUMMARY}"
          done < <(jq -cr '.[]' <<< "${IMAGE_CATALOG_JSON}")
