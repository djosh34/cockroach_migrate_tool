name: Publish Images

on:
  push:

env:
  CACHIX_CACHE_NAME: djosh34

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:

  build-images:
    name: build ${{ matrix.image }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: runner-image
            arch: amd64
            system: x86_64-linux
            runs_on: ubuntu-24.04
          - image: runner-image
            arch: arm64
            system: aarch64-linux
            runs_on: ubuntu-24.04-arm
          - image: verify-image
            arch: amd64
            system: x86_64-linux
            runs_on: ubuntu-24.04
          - image: verify-image
            arch: arm64
            system: aarch64-linux
            runs_on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v14
        with:
          name: ${{ env.CACHIX_CACHE_NAME }}
          authToken: '${{ secrets.CACHIX_TOKEN }}'
      - name: Build image archive
        run: |
          set -euo pipefail

          artifact_dir="${RUNNER_TEMP}/image-artifact"
          archive_name="${{ matrix.image }}-${{ matrix.arch }}.tar.gz"

          mkdir -p "$artifact_dir"

          nix build ".#packages.${{ matrix.system }}.${{ matrix.image }}" --print-build-logs --show-trace

          image_archive="$(readlink -f ./result)"
          if [[ ! -s "$image_archive" ]]; then
            echo "error: expected non-empty image archive at $image_archive" >&2
            exit 1
          fi

          cp "$image_archive" "$artifact_dir/$archive_name"

          cat >"$artifact_dir/metadata.env" <<EOF
          image=${{ matrix.image }}
          arch=${{ matrix.arch }}
          system=${{ matrix.system }}
          archive_name=$archive_name
          EOF

          ls -lh "$artifact_dir"
      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: image-${{ matrix.image }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/image-artifact/
          if-no-files-found: error

  publish-multiarch:
    name: publish multi-platform images
    runs-on: ubuntu-24.04
    needs:
      - nix-flake-check
      - build-images
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/downloaded-artifacts
      - name: Install publish tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes jq skopeo
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - name: Publish multi-platform images from downloaded archives
        env:
          ARTIFACT_ROOT: ${{ runner.temp }}/downloaded-artifacts
          GHCR_OWNER: ${{ github.repository_owner }}
          GIT_SHA: ${{ github.sha }}
          GHCR_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
          PUBLISH_SUMMARY_PATH: ${{ runner.temp }}/ghcr-publish-summary.json
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          ./scripts/ci/publish-ghcr-multiarch-from-archives.sh
      - name: Publish existing GHCR images to Quay and report Quay security state
        env:
          GHCR_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          GHCR_PUBLISH_SUMMARY_PATH: ${{ runner.temp }}/ghcr-publish-summary.json
          GHCR_USERNAME: ${{ github.actor }}
          QUAY_ORGANIZATION: ${{ vars.QUAY_ORGANIZATION }}
          QUAY_PASSWORD: ${{ secrets.QUAY_ROBOT_PASSWORD }}
          QUAY_PUBLISH_SUMMARY_PATH: ${{ runner.temp }}/quay-publish-summary.json
          QUAY_USERNAME: ${{ secrets.QUAY_ROBOT_USERNAME }}
          RUNNER_IMAGE_REPOSITORY: ${{ vars.RUNNER_IMAGE_REPOSITORY }}
          VERIFY_IMAGE_REPOSITORY: ${{ vars.VERIFY_IMAGE_REPOSITORY }}
        run: |
          set -euo pipefail
          ./scripts/ci/publish-quay-from-ghcr.sh
