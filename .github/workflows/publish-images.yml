name: publish-images

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read
  id-token: write

env:
  GHCR_REGISTRY: ghcr.io
  QUAY_REGISTRY: quay.io
  QUAY_ORGANIZATION: ${{ vars.QUAY_ORGANIZATION }}

jobs:
  publish-catalog:
    runs-on: ubuntu-24.04
    outputs:
      audit_catalog: ${{ steps.catalog.outputs.audit_catalog }}
      build_platform_matrix: ${{ steps.catalog.outputs.build_platform_matrix }}
      image_matrix: ${{ steps.catalog.outputs.image_matrix }}
      validation_matrix: ${{ steps.catalog.outputs.validation_matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Evaluate flake-owned CI workflow catalog
        id: catalog
        run: |
          set -euo pipefail
          catalog_json="$(nix eval --json .#github.ciWorkflowCatalog)"
          CATALOG_JSON="${catalog_json}" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          catalog = json.loads(os.environ["CATALOG_JSON"])
          output_path = Path(os.environ["GITHUB_OUTPUT"])
          for key in (
              "audit",
              "build_platform_matrix",
              "image_matrix",
              "validation_matrix",
          ):
              output_path.open("a", encoding="utf-8").write(
                  f"{key}<<EOF\n{json.dumps(catalog[key])}\nEOF\n"
              )
          PY

  build-platform:
    needs:
      - publish-catalog
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.publish-catalog.outputs.build_platform_matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false
          use-gha-cache: true
      - name: Build platform foundation through Nix
        env:
          BUILD_PLATFORM_EVIDENCE_FILE: ${{ runner.temp }}/build-platform-evidence/build-platform-evidence.json
          BUILD_OUTPUT_ID: ${{ matrix.build_output_id }}
          BUILD_RESULT_JSON: ${{ runner.temp }}/build-platform-evidence/build-result.json
          DRY_RUN_JSON: ${{ runner.temp }}/build-platform-evidence/dry-run.json
          DRY_RUN_LOG: ${{ runner.temp }}/build-platform-evidence/dry-run.log
          BUILD_LOG: ${{ runner.temp }}/build-platform-evidence/build.log
          INSTALLABLE: ${{ matrix.installable }}
          PLATFORM: ${{ matrix.platform }}
          PLATFORM_TAG_SUFFIX: ${{ matrix.platform_tag_suffix }}
          SYSTEM: ${{ matrix.system }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${BUILD_PLATFORM_EVIDENCE_FILE}")"
          started_at_epoch_seconds="$(python3 -c 'import time; print(time.time())')"
          python3 - <<'PY'
          import os
          import subprocess

          with open(os.environ["DRY_RUN_JSON"], "w", encoding="utf-8") as stdout, open(
              os.environ["DRY_RUN_LOG"], "w", encoding="utf-8"
          ) as stderr:
              subprocess.run(
                  ["nix", "build", "--dry-run", "--json", os.environ["INSTALLABLE"]],
                  check=True,
                  stdout=stdout,
                  stderr=stderr,
                  text=True,
              )
          with open(os.environ["BUILD_RESULT_JSON"], "w", encoding="utf-8") as stdout, open(
              os.environ["BUILD_LOG"], "w", encoding="utf-8"
          ) as stderr:
              subprocess.run(
                  ["nix", "build", "--json", "--no-link", os.environ["INSTALLABLE"]],
                  check=True,
                  stdout=stdout,
                  stderr=stderr,
                  text=True,
              )
          PY
          completed_at_epoch_seconds="$(python3 -c 'import time; print(time.time())')"
          STARTED_AT_EPOCH_SECONDS="${started_at_epoch_seconds}" \
          COMPLETED_AT_EPOCH_SECONDS="${completed_at_epoch_seconds}" \
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          def split_non_empty_lines(raw: str) -> list[str]:
              return [line.strip() for line in raw.splitlines() if line.strip()]


          def run_json(argv: list[str]) -> object:
              completed = subprocess.run(argv, check=True, capture_output=True, text=True)
              return json.loads(completed.stdout)


          def drv_path_for(out_path: str) -> str:
              completed = subprocess.run(
                  ["nix", "path-info", "--derivation", out_path],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              drv_paths = split_non_empty_lines(completed.stdout)
              if len(drv_paths) != 1:
                  raise SystemExit(
                      f"expected exactly one derivation path for {out_path}, got {drv_paths}"
                  )
              return drv_paths[0]


          def describe_paths(paths: list[str]) -> list[dict]:
              path_info = run_json(["nix", "path-info", "--json", *paths])
              records = []
              for out_path in paths:
                  metadata = path_info.get(out_path)
                  if not isinstance(metadata, dict):
                      raise SystemExit(f"missing path-info metadata for {out_path}")
                  nar_hash = metadata.get("narHash")
                  if not isinstance(nar_hash, str) or not nar_hash:
                      raise SystemExit(f"missing narHash for {out_path}")
                  records.append(
                      {
                          "drv_path": drv_path_for(out_path),
                          "nar_hash": nar_hash,
                          "nar_size": metadata.get("narSize"),
                          "out_path": out_path,
                      }
                  )
              return records


          def discover_reusable_outputs(root_records: list[dict]) -> list[dict]:
              reusable_records = []
              for root_record in root_records:
                  root_path = Path(root_record["out_path"])
                  if not root_path.is_dir():
                      continue
                  member_paths = []
                  member_ids = {}
                  for entry in sorted(root_path.iterdir()):
                      if not entry.is_symlink():
                          continue
                      target = entry.resolve(strict=True)
                      target_text = str(target)
                      if not target_text.startswith("/nix/store/"):
                          continue
                      member_paths.append(target_text)
                      member_ids[target_text] = entry.name
                  if not member_paths:
                      continue
                  for record in describe_paths(member_paths):
                      record["logical_id"] = member_ids[record["out_path"]]
                      reusable_records.append(record)
              return reusable_records


          build_result = json.loads(Path(os.environ["BUILD_RESULT_JSON"]).read_text())
          dry_run_plan = json.loads(Path(os.environ["DRY_RUN_JSON"]).read_text())
          if not isinstance(build_result, list) or not build_result:
              raise SystemExit("nix build must emit at least one build result entry")
          root_paths = []
          for entry in build_result:
              outputs = entry.get("outputs")
              if not isinstance(outputs, dict) or not outputs:
                  raise SystemExit(f"build result entry is missing outputs: {entry}")
              root_paths.extend(outputs.values())
          root_records = describe_paths(root_paths)
          payload = {
              "build_output_id": os.environ["BUILD_OUTPUT_ID"],
              "build_timing": {
                  "completed_at_epoch_seconds": float(
                      os.environ["COMPLETED_AT_EPOCH_SECONDS"]
                  ),
                  "duration_seconds": float(
                      os.environ["COMPLETED_AT_EPOCH_SECONDS"]
                  )
                  - float(os.environ["STARTED_AT_EPOCH_SECONDS"]),
                  "started_at_epoch_seconds": float(
                      os.environ["STARTED_AT_EPOCH_SECONDS"]
                  ),
              },
              "build_result": build_result,
              "dry_run_plan": dry_run_plan,
              "installable": os.environ["INSTALLABLE"],
              "platform": os.environ["PLATFORM"],
              "platform_tag_suffix": os.environ["PLATFORM_TAG_SUFFIX"],
              "reusable_output_records": discover_reusable_outputs(root_records),
              "root_records": root_records,
              "stage": "build-platform",
              "system": os.environ["SYSTEM"],
            }
          Path(os.environ["BUILD_PLATFORM_EVIDENCE_FILE"]).write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Upload build-platform evidence
        uses: actions/upload-artifact@v7
        with:
          name: build-platform-evidence-${{ matrix.system }}-${{ matrix.build_output_id }}
          path: ${{ runner.temp }}/build-platform-evidence
          if-no-files-found: error

  validate-fast:
    needs:
      - publish-catalog
      - build-platform
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.publish-catalog.outputs.validation_matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false
          use-gha-cache: true
      - name: Download build-platform evidence
        uses: actions/download-artifact@v8
        with:
          pattern: build-platform-evidence-${{ matrix.system }}-*
          path: ${{ runner.temp }}/build-platform-evidence
          merge-multiple: true
      - name: Validate repository lanes through Nix
        env:
          VALIDATION_EVIDENCE_FILE: ${{ runner.temp }}/validation-evidence/validation-evidence.json
          BUILD_PLATFORM_EVIDENCE_DIR: ${{ runner.temp }}/build-platform-evidence
          BUILD_RESULT_JSON: ${{ runner.temp }}/validation-evidence/build-result.json
          DRY_RUN_JSON: ${{ runner.temp }}/validation-evidence/dry-run.json
          DRY_RUN_LOG: ${{ runner.temp }}/validation-evidence/dry-run.log
          BUILD_LOG: ${{ runner.temp }}/validation-evidence/build.log
          INSTALLABLES_JSON: ${{ toJson(matrix.installables) }}
          REQUIRED_BUILD_OUTPUT_IDS_JSON: ${{ toJson(matrix.required_build_output_ids) }}
          SYSTEM: ${{ matrix.system }}
          VALIDATION_ID: ${{ matrix.validation_id }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${VALIDATION_EVIDENCE_FILE}")"
          started_at_epoch_seconds="$(python3 -c 'import time; print(time.time())')"
          python3 - <<'PY'
          import json
          import os
          import subprocess

          installables = json.loads(os.environ["INSTALLABLES_JSON"])
          with open(os.environ["DRY_RUN_JSON"], "w", encoding="utf-8") as stdout, open(
              os.environ["DRY_RUN_LOG"], "w", encoding="utf-8"
          ) as stderr:
              subprocess.run(
                  ["nix", "build", "--dry-run", "--json", *installables],
                  check=True,
                  stdout=stdout,
                  stderr=stderr,
                  text=True,
              )
          PY
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          build_evidence_paths = sorted(
              Path(os.environ["BUILD_PLATFORM_EVIDENCE_DIR"]).glob("**/build-platform-evidence.json")
          )
          if not build_evidence_paths:
              raise SystemExit("missing build-platform evidence artifacts for validation")
          required_build_output_ids = set(
              json.loads(os.environ["REQUIRED_BUILD_OUTPUT_IDS_JSON"])
          )
          build_platform_evidence = [json.loads(path.read_text()) for path in build_evidence_paths]
          available_build_output_ids = {
              evidence["build_output_id"] for evidence in build_platform_evidence
          }
          missing_build_output_ids = sorted(
              required_build_output_ids - available_build_output_ids
          )
          if missing_build_output_ids:
              raise SystemExit(
                  f"missing build-platform evidence for {missing_build_output_ids}"
              )
          dry_run_plan = json.loads(Path(os.environ["DRY_RUN_JSON"]).read_text())
          reusable_drv_paths = set()
          reusable_out_paths = set()
          for evidence in build_platform_evidence:
              if evidence["build_output_id"] not in required_build_output_ids:
                  continue
              reusable_drv_paths.update(
                  record["drv_path"] for record in evidence["reusable_output_records"]
              )
              reusable_out_paths.update(
                  record["out_path"] for record in evidence["reusable_output_records"]
              )
          planned_drv_paths = {entry["drvPath"] for entry in dry_run_plan}
          planned_out_paths = {
              out_path
              for entry in dry_run_plan
              for out_path in entry.get("outputs", {}).values()
          }
          duplicate_drv_paths = sorted(planned_drv_paths & reusable_drv_paths)
          duplicate_out_paths = sorted(planned_out_paths & reusable_out_paths)
          if duplicate_drv_paths or duplicate_out_paths:
              raise SystemExit(
                  json.dumps(
                      {
                          "duplicate_drv_paths": duplicate_drv_paths,
                          "duplicate_out_paths": duplicate_out_paths,
                          "message": "validation stage would rebuild build-platform outputs",
                      },
                      indent=2,
                      sort_keys=True,
                  )
              )
          PY
          python3 - <<'PY'
          import json
          import os
          import subprocess

          installables = json.loads(os.environ["INSTALLABLES_JSON"])
          with open(os.environ["BUILD_RESULT_JSON"], "w", encoding="utf-8") as stdout, open(
              os.environ["BUILD_LOG"], "w", encoding="utf-8"
          ) as stderr:
              subprocess.run(
                  ["nix", "build", "--json", "--no-link", *installables],
                  check=True,
                  stdout=stdout,
                  stderr=stderr,
                  text=True,
              )
          PY
          completed_at_epoch_seconds="$(python3 -c 'import time; print(time.time())')"
          STARTED_AT_EPOCH_SECONDS="${started_at_epoch_seconds}" \
          COMPLETED_AT_EPOCH_SECONDS="${completed_at_epoch_seconds}" \
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          def split_non_empty_lines(raw: str) -> list[str]:
              return [line.strip() for line in raw.splitlines() if line.strip()]


          def drv_path_for(out_path: str) -> str:
              completed = subprocess.run(
                  ["nix", "path-info", "--derivation", out_path],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              drv_paths = split_non_empty_lines(completed.stdout)
              if len(drv_paths) != 1:
                  raise SystemExit(
                      f"expected exactly one derivation path for {out_path}, got {drv_paths}"
                  )
              return drv_paths[0]


          def describe_paths(paths: list[str]) -> list[dict]:
              path_info = json.loads(
                  subprocess.run(
                      ["nix", "path-info", "--json", *paths],
                      check=True,
                      capture_output=True,
                      text=True,
                  ).stdout
              )
              records = []
              for out_path in paths:
                  metadata = path_info.get(out_path)
                  if not isinstance(metadata, dict):
                      raise SystemExit(f"missing path-info metadata for {out_path}")
                  nar_hash = metadata.get("narHash")
                  if not isinstance(nar_hash, str) or not nar_hash:
                      raise SystemExit(f"missing narHash for {out_path}")
                  records.append(
                      {
                          "drv_path": drv_path_for(out_path),
                          "nar_hash": nar_hash,
                          "nar_size": metadata.get("narSize"),
                          "out_path": out_path,
                      }
                  )
              return records


          build_result = json.loads(Path(os.environ["BUILD_RESULT_JSON"]).read_text())
          dry_run_plan = json.loads(Path(os.environ["DRY_RUN_JSON"]).read_text())
          if not isinstance(build_result, list) or not build_result:
              raise SystemExit("validation nix build must emit at least one build result entry")
          output_paths = []
          for entry in build_result:
              outputs = entry.get("outputs")
              if not isinstance(outputs, dict) or not outputs:
                  raise SystemExit(f"validation build result entry is missing outputs: {entry}")
              output_paths.extend(outputs.values())
          payload = {
              "build_platform_system": os.environ["SYSTEM"],
              "build_result": build_result,
              "build_timing": {
                  "completed_at_epoch_seconds": float(
                      os.environ["COMPLETED_AT_EPOCH_SECONDS"]
                  ),
                  "duration_seconds": float(
                      os.environ["COMPLETED_AT_EPOCH_SECONDS"]
                  )
                  - float(os.environ["STARTED_AT_EPOCH_SECONDS"]),
                  "started_at_epoch_seconds": float(
                      os.environ["STARTED_AT_EPOCH_SECONDS"]
                  ),
              },
              "required_build_output_ids": sorted(
                  json.loads(os.environ["REQUIRED_BUILD_OUTPUT_IDS_JSON"])
              ),
              "dry_run_plan": dry_run_plan,
              "installables": json.loads(os.environ["INSTALLABLES_JSON"]),
              "output_records": describe_paths(output_paths),
              "stage": "validate-fast",
              "system": os.environ["SYSTEM"],
              "validation_id": os.environ["VALIDATION_ID"],
          }
          Path(os.environ["VALIDATION_EVIDENCE_FILE"]).write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Upload validation evidence
        uses: actions/upload-artifact@v7
        with:
          name: validation-evidence-${{ matrix.validation_id }}
          path: ${{ runner.temp }}/validation-evidence
          if-no-files-found: error

  build-image:
    needs:
      - publish-catalog
      - build-platform
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.publish-catalog.outputs.image_matrix) }}
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false
          use-gha-cache: true
      - name: Download build-platform evidence
        uses: actions/download-artifact@v8
        with:
          pattern: build-platform-evidence-${{ matrix.platform.system }}-*
          path: ${{ runner.temp }}/build-platform-evidence
          merge-multiple: true
      - name: Build image archive through Nix
        env:
          IMAGE_EVIDENCE_FILE: ${{ runner.temp }}/image-archive/image-evidence.json
          BUILD_PLATFORM_EVIDENCE_DIR: ${{ runner.temp }}/build-platform-evidence
          BUILD_RESULT_JSON: ${{ runner.temp }}/image-archive/build-result.json
          DRY_RUN_JSON: ${{ runner.temp }}/image-archive/dry-run.json
          DRY_RUN_LOG: ${{ runner.temp }}/image-archive/dry-run.log
          BUILD_LOG: ${{ runner.temp }}/image-archive/build.log
          IMAGE_ID: ${{ matrix.image.image_id }}
          IMAGE_INSTALLABLE: ${{ matrix.image_installable }}
          IMAGE_OUTPUT_ID: ${{ matrix.image_output_id }}
          GHCR_REPOSITORY: ${{ matrix.image.ghcr_repository }}
          LOADED_IMAGE_REF: ${{ matrix.image.loaded_image_ref }}
          MANIFEST_KEY: ${{ matrix.image.manifest_key }}
          PLATFORM: ${{ matrix.platform.platform }}
          PLATFORM_TAG_SUFFIX: ${{ matrix.platform.platform_tag_suffix }}
          QUAY_REPOSITORY_NAME: ${{ matrix.image.quay_repository }}
          REQUIRED_BUILD_OUTPUT_IDS_JSON: ${{ toJson(matrix.required_build_output_ids) }}
          SYSTEM: ${{ matrix.platform.system }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${IMAGE_EVIDENCE_FILE}")"
          started_at_epoch_seconds="$(python3 -c 'import time; print(time.time())')"
          python3 - <<'PY'
          import os
          import subprocess

          with open(os.environ["DRY_RUN_JSON"], "w", encoding="utf-8") as stdout, open(
              os.environ["DRY_RUN_LOG"], "w", encoding="utf-8"
          ) as stderr:
              subprocess.run(
                  ["nix", "build", "--dry-run", "--json", os.environ["IMAGE_INSTALLABLE"]],
                  check=True,
                  stdout=stdout,
                  stderr=stderr,
                  text=True,
              )
          PY
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          build_evidence_paths = sorted(
              Path(os.environ["BUILD_PLATFORM_EVIDENCE_DIR"]).glob("**/build-platform-evidence.json")
          )
          if not build_evidence_paths:
              raise SystemExit("missing build-platform evidence artifacts for image build")
          required_build_output_ids = set(
              json.loads(os.environ["REQUIRED_BUILD_OUTPUT_IDS_JSON"])
          )
          build_platform_evidence = [json.loads(path.read_text()) for path in build_evidence_paths]
          available_build_output_ids = {
              evidence["build_output_id"] for evidence in build_platform_evidence
          }
          missing_build_output_ids = sorted(
              required_build_output_ids - available_build_output_ids
          )
          if missing_build_output_ids:
              raise SystemExit(
                  f"missing build-platform evidence for {missing_build_output_ids}"
              )
          dry_run_plan = json.loads(Path(os.environ["DRY_RUN_JSON"]).read_text())
          reusable_drv_paths = set()
          reusable_out_paths = set()
          for evidence in build_platform_evidence:
              if evidence["build_output_id"] not in required_build_output_ids:
                  continue
              reusable_drv_paths.update(
                  record["drv_path"] for record in evidence["reusable_output_records"]
              )
              reusable_out_paths.update(
                  record["out_path"] for record in evidence["reusable_output_records"]
              )
          planned_drv_paths = {entry["drvPath"] for entry in dry_run_plan}
          planned_out_paths = {
              out_path
              for entry in dry_run_plan
              for out_path in entry.get("outputs", {}).values()
          }
          duplicate_drv_paths = sorted(planned_drv_paths & reusable_drv_paths)
          duplicate_out_paths = sorted(planned_out_paths & reusable_out_paths)
          if duplicate_drv_paths or duplicate_out_paths:
              raise SystemExit(
                  json.dumps(
                      {
                          "duplicate_drv_paths": duplicate_drv_paths,
                          "duplicate_out_paths": duplicate_out_paths,
                          "message": "image stage would rebuild build-platform outputs",
                      },
                      indent=2,
                      sort_keys=True,
                  )
              )
          PY
          python3 - <<'PY'
          import os
          import subprocess

          with open(os.environ["BUILD_RESULT_JSON"], "w", encoding="utf-8") as stdout, open(
              os.environ["BUILD_LOG"], "w", encoding="utf-8"
          ) as stderr:
              subprocess.run(
                  ["nix", "build", "--json", "--no-link", os.environ["IMAGE_INSTALLABLE"]],
                  check=True,
                  stdout=stdout,
                  stderr=stderr,
                  text=True,
              )
          PY
          completed_at_epoch_seconds="$(python3 -c 'import time; print(time.time())')"
          STARTED_AT_EPOCH_SECONDS="${started_at_epoch_seconds}" \
          COMPLETED_AT_EPOCH_SECONDS="${completed_at_epoch_seconds}" \
          python3 - <<'PY'
          import json
          import os
          import shutil
          import subprocess
          from pathlib import Path

          def split_non_empty_lines(raw: str) -> list[str]:
              return [line.strip() for line in raw.splitlines() if line.strip()]


          def drv_path_for(out_path: str) -> str:
              completed = subprocess.run(
                  ["nix", "path-info", "--derivation", out_path],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              drv_paths = split_non_empty_lines(completed.stdout)
              if len(drv_paths) != 1:
                  raise SystemExit(
                      f"expected exactly one derivation path for {out_path}, got {drv_paths}"
                  )
              return drv_paths[0]


          build_result = json.loads(Path(os.environ["BUILD_RESULT_JSON"]).read_text())
          dry_run_plan = json.loads(Path(os.environ["DRY_RUN_JSON"]).read_text())
          if len(build_result) != 1:
              raise SystemExit(f"image build must return exactly one result entry, got {build_result}")
          outputs = build_result[0].get("outputs")
          if not isinstance(outputs, dict) or len(outputs) != 1:
              raise SystemExit(f"image build must return exactly one output path, got {build_result[0]}")
          output_path = next(iter(outputs.values()))
          path_info = json.loads(
              subprocess.run(
                  ["nix", "path-info", "--json", output_path],
                  check=True,
                  capture_output=True,
                  text=True,
              ).stdout
          )
          metadata = path_info.get(output_path)
          if not isinstance(metadata, dict):
              raise SystemExit(f"missing path-info metadata for {output_path}")
          nar_hash = metadata.get("narHash")
          if not isinstance(nar_hash, str) or not nar_hash:
              raise SystemExit(f"missing narHash for {output_path}")
          archive_source = Path(output_path)
          if not archive_source.is_file():
              raise SystemExit(f"expected image output to be a file: {output_path}")
          archive_copy = Path(os.environ["IMAGE_EVIDENCE_FILE"]).parent / archive_source.name
          shutil.copyfile(archive_source, archive_copy)
          payload = {
              "archive_file_name": archive_copy.name,
              "build_platform_system": os.environ["SYSTEM"],
              "build_result": build_result,
              "build_timing": {
                  "completed_at_epoch_seconds": float(
                      os.environ["COMPLETED_AT_EPOCH_SECONDS"]
                  ),
                  "duration_seconds": float(
                      os.environ["COMPLETED_AT_EPOCH_SECONDS"]
                  )
                  - float(os.environ["STARTED_AT_EPOCH_SECONDS"]),
                  "started_at_epoch_seconds": float(
                      os.environ["STARTED_AT_EPOCH_SECONDS"]
                  ),
              },
              "required_build_output_ids": sorted(
                  json.loads(os.environ["REQUIRED_BUILD_OUTPUT_IDS_JSON"])
              ),
              "dry_run_plan": dry_run_plan,
              "ghcr_repository": os.environ["GHCR_REPOSITORY"],
              "image_id": os.environ["IMAGE_ID"],
              "image_installable": os.environ["IMAGE_INSTALLABLE"],
              "image_output_id": os.environ["IMAGE_OUTPUT_ID"],
              "loaded_image_ref": os.environ["LOADED_IMAGE_REF"],
              "manifest_key": os.environ["MANIFEST_KEY"],
              "output_record": {
                  "drv_path": drv_path_for(output_path),
                  "nar_hash": nar_hash,
                  "nar_size": metadata.get("narSize"),
                  "out_path": output_path,
              },
              "platform": os.environ["PLATFORM"],
              "platform_tag_suffix": os.environ["PLATFORM_TAG_SUFFIX"],
              "quay_repository": os.environ["QUAY_REPOSITORY_NAME"],
              "stage": "build-image",
              "system": os.environ["SYSTEM"],
          }
          Path(os.environ["IMAGE_EVIDENCE_FILE"]).write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Upload built image archive and evidence
        uses: actions/upload-artifact@v7
        with:
          name: image-archive-${{ matrix.image.image_id }}-${{ matrix.platform.platform_tag_suffix }}
          path: ${{ runner.temp }}/image-archive
          if-no-files-found: error

  publish-image:
    needs:
      - build-image
      - publish-catalog
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.publish-catalog.outputs.image_matrix) }}
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
    env:
      PUBLISHED_IMAGE_REF_FILE: ${{ github.workspace }}/published-image-refs/${{ matrix.image.image_id }}-${{ matrix.platform.platform_tag_suffix }}-image-ref.json
    steps:
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install publish tools through Nix
        run: |
          set -euo pipefail
          nix profile install nixpkgs#skopeo
      - name: Download built image archive
        uses: actions/download-artifact@v8
        with:
          name: image-archive-${{ matrix.image.image_id }}-${{ matrix.platform.platform_tag_suffix }}
          path: ${{ runner.temp }}/image-archive
      - name: Publish prebuilt image archive to Quay
        env:
          GHCR_REPOSITORY: ${{ matrix.image.ghcr_repository }}
          IMAGE_ID: ${{ matrix.image.image_id }}
          IMAGE_OUTPUT_ID: ${{ matrix.image_output_id }}
          MANIFEST_KEY: ${{ matrix.image.manifest_key }}
          PLATFORM: ${{ matrix.platform.platform }}
          PLATFORM_TAG_SUFFIX: ${{ matrix.platform.platform_tag_suffix }}
          QUAY_REPOSITORY_NAME: ${{ matrix.image.quay_repository }}
          QUAY_ROBOT_PASSWORD: ${{ secrets.QUAY_ROBOT_PASSWORD }}
          QUAY_ROBOT_USERNAME: ${{ secrets.QUAY_ROBOT_USERNAME }}
        run: |
          set -euo pipefail
          : "${QUAY_ORGANIZATION:?missing QUAY_ORGANIZATION GitHub repository variable}"
          started_at_epoch_seconds="$(python3 -c 'import time; print(time.time())')"
          readarray -t image_artifact_fields < <(
            python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence = json.loads(
              Path(os.environ["RUNNER_TEMP"], "image-archive", "image-evidence.json").read_text()
          )
          archive_path = Path(os.environ["RUNNER_TEMP"], "image-archive", evidence["archive_file_name"])
          if not archive_path.is_file():
              raise SystemExit(f"missing image archive artifact: {archive_path}")
          print(str(archive_path))
          print(evidence["loaded_image_ref"])
          print(evidence["output_record"]["out_path"])
          print(evidence["output_record"]["nar_hash"])
          PY
          )
          archive_path="${image_artifact_fields[0]}"
          loaded_image_ref="${image_artifact_fields[1]}"
          source_out_path="${image_artifact_fields[2]}"
          source_nar_hash="${image_artifact_fields[3]}"
          quay_repository="${QUAY_ORGANIZATION}/${QUAY_REPOSITORY_NAME}"
          final_image_ref="${{ env.QUAY_REGISTRY }}/${quay_repository}:${{ github.sha }}"
          platform_image_ref="${final_image_ref}-${PLATFORM_TAG_SUFFIX}"
          mkdir -p "$(dirname "${PUBLISHED_IMAGE_REF_FILE}")"
          skopeo copy \
            --dest-creds "${QUAY_ROBOT_USERNAME}:${QUAY_ROBOT_PASSWORD}" \
            "docker-archive:${archive_path}:${loaded_image_ref}" \
            "docker://${platform_image_ref}"
          platform_digest="$(
            skopeo inspect \
              --creds "${QUAY_ROBOT_USERNAME}:${QUAY_ROBOT_PASSWORD}" \
              "docker://${platform_image_ref}" \
              | python3 -c 'import json, sys; print(json.load(sys.stdin)["Digest"])'
          )"
          completed_at_epoch_seconds="$(python3 -c 'import time; print(time.time())')"
          STARTED_AT_EPOCH_SECONDS="${started_at_epoch_seconds}" \
          COMPLETED_AT_EPOCH_SECONDS="${completed_at_epoch_seconds}" \
          FINAL_IMAGE_REF="${final_image_ref}" \
          GHCR_REPOSITORY="${GHCR_REPOSITORY}" \
          IMAGE_ID="${IMAGE_ID}" \
          IMAGE_OUTPUT_ID="${IMAGE_OUTPUT_ID}" \
          MANIFEST_KEY="${MANIFEST_KEY}" \
          PLATFORM="${PLATFORM}" \
          PLATFORM_DIGEST="${platform_digest}" \
          PLATFORM_IMAGE_REF="${platform_image_ref}" \
          PLATFORM_TAG_SUFFIX="${PLATFORM_TAG_SUFFIX}" \
          PUBLISHED_IMAGE_REF_FILE="${PUBLISHED_IMAGE_REF_FILE}" \
          QUAY_REPOSITORY="${quay_repository}" \
          SOURCE_NAR_HASH="${source_nar_hash}" \
          SOURCE_OUT_PATH="${source_out_path}" \
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          started = float(os.environ["STARTED_AT_EPOCH_SECONDS"])
          completed = float(os.environ["COMPLETED_AT_EPOCH_SECONDS"])
          payload = {
              "duration_seconds": completed - started,
              "final_image_ref": os.environ["FINAL_IMAGE_REF"],
              "ghcr_repository": os.environ["GHCR_REPOSITORY"],
              "image_id": os.environ["IMAGE_ID"],
              "image_output_id": os.environ["IMAGE_OUTPUT_ID"],
              "manifest_key": os.environ["MANIFEST_KEY"],
              "platform": os.environ["PLATFORM"],
              "platform_digest": os.environ["PLATFORM_DIGEST"],
              "platform_image_ref": os.environ["PLATFORM_IMAGE_REF"],
              "platform_tag_suffix": os.environ["PLATFORM_TAG_SUFFIX"],
              "quay_repository": os.environ["QUAY_REPOSITORY"],
              "source_nar_hash": os.environ["SOURCE_NAR_HASH"],
              "source_out_path": os.environ["SOURCE_OUT_PATH"],
          }
          output_path = Path(os.environ["PUBLISHED_IMAGE_REF_FILE"])
          output_path.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n")
          PY
      - name: Upload published image ref artifact
        uses: actions/upload-artifact@v7
        with:
          name: published-image-${{ matrix.image.image_id }}-${{ matrix.platform.platform_tag_suffix }}
          path: ${{ env.PUBLISHED_IMAGE_REF_FILE }}
          if-no-files-found: error

  audit-immutable-identities:
    needs:
      - publish-catalog
      - build-platform
      - validate-fast
      - build-image
      - publish-image
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    runs-on: ubuntu-24.04
    steps:
      - name: Download build-platform evidence
        uses: actions/download-artifact@v8
        with:
          pattern: build-platform-evidence-*
          path: ${{ runner.temp }}/build-platform-evidence
      - name: Download validation evidence
        uses: actions/download-artifact@v8
        with:
          pattern: validation-evidence-*
          path: ${{ runner.temp }}/validation-evidence
      - name: Download built image archives and evidence
        uses: actions/download-artifact@v8
        with:
          pattern: image-archive-*
          path: ${{ runner.temp }}/image-archive
      - name: Download published image refs
        uses: actions/download-artifact@v8
        with:
          pattern: published-image-*
          path: ${{ runner.temp }}/published-image-refs
      - name: Audit immutable build, image, and publish identities
        env:
          AUDIT_CATALOG_JSON: ${{ needs.publish-catalog.outputs.audit_catalog }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          audit_catalog = json.loads(os.environ["AUDIT_CATALOG_JSON"])
          build_evidence_paths = sorted(
              Path(os.environ["RUNNER_TEMP"], "build-platform-evidence").glob(
                  "*/build-platform-evidence.json"
              )
          )
          validation_evidence_paths = sorted(
              Path(os.environ["RUNNER_TEMP"], "validation-evidence").glob(
                  "*/validation-evidence.json"
              )
          )
          image_evidence_paths = sorted(
              Path(os.environ["RUNNER_TEMP"], "image-archive").glob("*/image-evidence.json")
          )
          publish_evidence_paths = sorted(
              Path(os.environ["RUNNER_TEMP"], "published-image-refs").glob("*/**/*.json")
          )
          if not build_evidence_paths:
              raise SystemExit("missing build-platform evidence artifacts")
          if not validation_evidence_paths:
              raise SystemExit("missing validation evidence artifacts")
          if not image_evidence_paths:
              raise SystemExit("missing image evidence artifacts")
          if not publish_evidence_paths:
              raise SystemExit("missing publish evidence artifacts")

          build_evidence = [json.loads(path.read_text()) for path in build_evidence_paths]
          validation_evidence = [
              json.loads(path.read_text()) for path in validation_evidence_paths
          ]
          image_evidence = [json.loads(path.read_text()) for path in image_evidence_paths]
          publish_evidence = [json.loads(path.read_text()) for path in publish_evidence_paths]

          build_by_output_id = {}
          for evidence in build_evidence:
              build_output_id = evidence["build_output_id"]
              if build_output_id in build_by_output_id:
                  raise SystemExit(
                      f"duplicate build-platform evidence for {build_output_id}"
                  )
              build_by_output_id[build_output_id] = evidence

          validation_by_id = {}
          for evidence in validation_evidence:
              validation_id = evidence["validation_id"]
              if validation_id in validation_by_id:
                  raise SystemExit(f"duplicate validation evidence for {validation_id}")
              validation_by_id[validation_id] = evidence

          image_by_output_id = {}
          for evidence in image_evidence:
              output_id = evidence["image_output_id"]
              if output_id in image_by_output_id:
                  raise SystemExit(f"duplicate image evidence for {output_id}")
              image_by_output_id[output_id] = evidence

          publish_by_output_id = {}
          for evidence in publish_evidence:
              output_id = evidence["image_output_id"]
              if output_id in publish_by_output_id:
                  raise SystemExit(f"duplicate publish evidence for {output_id}")
              publish_by_output_id[output_id] = evidence

          missing_build_output_ids = sorted(
              set(audit_catalog["required_build_output_ids"]) - set(build_by_output_id)
          )
          missing_validation_ids = sorted(
              set(audit_catalog["required_validation_ids"]) - set(validation_by_id)
          )
          missing_image_output_ids = sorted(
              set(audit_catalog["required_image_output_ids"]) - set(image_by_output_id)
          )
          missing_publish_output_ids = sorted(
              set(audit_catalog["required_publish_output_ids"]) - set(publish_by_output_id)
          )
          if missing_build_output_ids:
              raise SystemExit(
                  f"missing build-platform evidence for {missing_build_output_ids}"
              )
          if missing_validation_ids:
              raise SystemExit(f"missing validation evidence for {missing_validation_ids}")
          if missing_image_output_ids:
              raise SystemExit(f"missing image evidence for {missing_image_output_ids}")
          if missing_publish_output_ids:
              raise SystemExit(f"missing publish evidence for {missing_publish_output_ids}")

          for evidence in validation_evidence:
              reusable_drv_paths = set()
              reusable_out_paths = set()
              for build_output_id in evidence["required_build_output_ids"]:
                  foundation = build_by_output_id[build_output_id]
                  reusable_drv_paths.update(
                      record["drv_path"] for record in foundation["reusable_output_records"]
                  )
                  reusable_out_paths.update(
                      record["out_path"] for record in foundation["reusable_output_records"]
                  )
              planned_drv_paths = {entry["drvPath"] for entry in evidence["dry_run_plan"]}
              planned_out_paths = {
                  out_path
                  for entry in evidence["dry_run_plan"]
                  for out_path in entry.get("outputs", {}).values()
              }
              duplicate_drv_paths = sorted(planned_drv_paths & reusable_drv_paths)
              duplicate_out_paths = sorted(planned_out_paths & reusable_out_paths)
              if duplicate_drv_paths or duplicate_out_paths:
                  raise SystemExit(
                      json.dumps(
                          {
                              "duplicate_drv_paths": duplicate_drv_paths,
                              "duplicate_out_paths": duplicate_out_paths,
                              "validation_id": evidence["validation_id"],
                          },
                          indent=2,
                          sort_keys=True,
                      )
                  )

          for evidence in image_evidence:
              reusable_drv_paths = set()
              reusable_out_paths = set()
              for build_output_id in evidence["required_build_output_ids"]:
                  foundation = build_by_output_id[build_output_id]
                  reusable_drv_paths.update(
                      record["drv_path"] for record in foundation["reusable_output_records"]
                  )
                  reusable_out_paths.update(
                      record["out_path"] for record in foundation["reusable_output_records"]
                  )
              planned_drv_paths = {entry["drvPath"] for entry in evidence["dry_run_plan"]}
              planned_out_paths = {
                  out_path
                  for entry in evidence["dry_run_plan"]
                  for out_path in entry.get("outputs", {}).values()
              }
              duplicate_drv_paths = sorted(planned_drv_paths & reusable_drv_paths)
              duplicate_out_paths = sorted(planned_out_paths & reusable_out_paths)
              if duplicate_drv_paths or duplicate_out_paths:
                  raise SystemExit(
                      json.dumps(
                          {
                              "duplicate_drv_paths": duplicate_drv_paths,
                              "duplicate_out_paths": duplicate_out_paths,
                              "image_output_id": evidence["image_output_id"],
                          },
                          indent=2,
                          sort_keys=True,
                      )
                  )

          for output_id, publish_record in publish_by_output_id.items():
              image_record = image_by_output_id[output_id]
              source_record = image_record["output_record"]
              if publish_record["source_out_path"] != source_record["out_path"]:
                  raise SystemExit(
                      f"publish output {output_id} used out path {publish_record['source_out_path']} "
                      f"but image build produced {source_record['out_path']}"
                  )
              if publish_record["source_nar_hash"] != source_record["nar_hash"]:
                  raise SystemExit(
                      f"publish output {output_id} used nar hash {publish_record['source_nar_hash']} "
                      f"but image build produced {source_record['nar_hash']}"
                  )
              if not publish_record.get("platform_digest"):
                  raise SystemExit(f"missing platform digest for publish output {output_id}")

          summary_lines = [
              "## Immutable Identity Audit",
              "",
              f"- Build outputs audited: {', '.join(sorted(build_by_output_id))}",
              f"- Validation lanes audited: {', '.join(sorted(validation_by_id))}",
              f"- Image outputs audited: {', '.join(sorted(image_by_output_id))}",
              f"- Publish outputs audited: {', '.join(sorted(publish_by_output_id))}",
          ]
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(
              "\n".join(summary_lines) + "\n",
              encoding="utf-8",
          )
          PY

  quay-security-gate:
    needs:
      - publish-image
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    runs-on: ubuntu-24.04
    env:
      QUAY_SCAN_POLL_INTERVAL_SECONDS: "10"
      QUAY_SCAN_TIMEOUT_SECONDS: "1800"
    steps:
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install security-gate tools through Nix
        run: |
          set -euo pipefail
          nix profile install nixpkgs#jq
      - name: Download published image refs
        uses: actions/download-artifact@v8
        with:
          pattern: published-image-*
          path: ${{ runner.temp }}/published-image-refs
          merge-multiple: true
      - name: Evaluate Quay security gate
        id: evaluate-quay-security
        continue-on-error: true
        env:
          QUAY_ROBOT_USERNAME: ${{ secrets.QUAY_ROBOT_USERNAME }}
          QUAY_ROBOT_PASSWORD: ${{ secrets.QUAY_ROBOT_PASSWORD }}
        run: |
          set -euo pipefail
          refs_dir="${{ runner.temp }}/published-image-refs"
          test -d "${refs_dir}"
          summary_file="${{ runner.temp }}/quay-security-summary.md"
          {
            echo "## Quay Security Gate"
            echo
            echo "Raw Quay platform-tag publication completed before security evaluation began."
          } > "${summary_file}"
          manifest_list_scan_filter="$(cat <<'EOF'
          .manifest_data
          | fromjson
          | .manifests[]
          | select((.annotations["vnd.docker.reference.type"]? // "") != "attestation-manifest")
          | select((.platform.os? // "") != "unknown")
          | select((.platform.architecture? // "") != "unknown")
          | .digest
          EOF
          )"
          scan_findings_filter="$(cat <<'EOF'
          {
            status,
            scan_target: $scan_target,
            findings: [.. | .Vulnerabilities? | arrays | .[] | {Name, Severity, FixedBy}]
          }
          EOF
          )"

          append_summary() {
            printf '%s\n' "$1" >> "${summary_file}"
          }

          append_summary_json() {
            local title="$1"
            local payload="$2"
            {
              printf "\n%s\n\n" "${title}"
              printf '%s\n' '```json' "${payload}" '```'
            } >> "${summary_file}"
          }

          record_outcome() {
            local outcome="$1"
            echo "gate_outcome=${outcome}" >> "${GITHUB_OUTPUT}"
          }

          fail_gate() {
            local outcome="$1"
            local message="$2"
            local payload="${3:-}"
            record_outcome "${outcome}"
            append_summary ""
            append_summary "Gate outcome: \`${outcome}\`"
            append_summary "${message}"
            if [[ -n "${payload}" ]]; then
              append_summary_json "Payload" "${payload}"
            fi
            printf '%s\n' "${message}" >&2
            if [[ -n "${payload}" ]]; then
              printf '%s\n' "${payload}" >&2
            fi
            exit 1
          }

          run_quay_api() {
            local url="$1"
            local description="$2"
            local response_file
            local stderr_file
            local stderr_output
            local response_output
            response_file="$(mktemp)"
            stderr_file="$(mktemp)"
            if ! curl --silent --show-error --fail -u "${QUAY_ROBOT_USERNAME}:${QUAY_ROBOT_PASSWORD}" "${url}" > "${response_file}" 2> "${stderr_file}"; then
              stderr_output="$(cat "${stderr_file}")"
              response_output="$(cat "${response_file}")"
              rm -f "${response_file}" "${stderr_file}"
              fail_gate \
                "scanner_failure" \
                "Quay API call failed while ${description}." \
                "$(printf '%s\n%s' "${stderr_output}" "${response_output}")"
            fi
            QUAY_API_RESPONSE="$(cat "${response_file}")"
            rm -f "${response_file}" "${stderr_file}"
          }

          env_file_count=0
          declare -A scan_target_refs=()
          declare -A scan_target_repositories=()
          declare -A scan_target_statuses=()
          all_scan_targets=()
          while IFS= read -r ref_file; do
            env_file_count=$((env_file_count + 1))
            ref_payload="$(cat "${ref_file}")"
            quay_repository="$(jq -r ".quay_repository" <<< "${ref_payload}")"
            platform_image_ref="$(jq -r ".platform_image_ref" <<< "${ref_payload}")"
            platform="$(jq -r ".platform" <<< "${ref_payload}")"
            : "${quay_repository:?missing quay_repository}"
            : "${platform_image_ref:?missing platform_image_ref}"
            tag_name="${platform_image_ref##*:}"
            run_quay_api \
              "https://${{ env.QUAY_REGISTRY }}/api/v1/repository/${quay_repository}/tag/?specificTag=${tag_name}" \
              "loading tag metadata for ${platform_image_ref}"
            tag_response="${QUAY_API_RESPONSE}"
            manifest_digest="$(jq -r ".tags[0].manifest_digest // empty" <<< "${tag_response}")"
            is_manifest_list="$(jq -r ".tags[0].is_manifest_list // false" <<< "${tag_response}")"
            if [[ -z "${manifest_digest}" ]]; then
              fail_gate \
                "unexpected_payload" \
                "Quay tag metadata for ${platform_image_ref} did not include a manifest digest." \
                "$(jq "." <<< "${tag_response}")"
            fi

            scan_targets=()
            if [[ "${is_manifest_list}" == "true" ]]; then
              run_quay_api \
                "https://${{ env.QUAY_REGISTRY }}/api/v1/repository/${quay_repository}/manifest/${manifest_digest}" \
                "loading manifest-list details for ${platform_image_ref}"
              manifest_response="${QUAY_API_RESPONSE}"
              scan_targets_text="$(
                jq -er "${manifest_list_scan_filter}" <<< "${manifest_response}"
              )" || fail_gate \
                "unexpected_payload" \
                "Quay manifest-list payload for ${platform_image_ref} did not expose any scanable child manifests." \
                "$(jq "." <<< "${manifest_response}")"
              while IFS= read -r scan_target; do
                test -n "${scan_target}"
                scan_targets+=("${scan_target}")
              done <<< "${scan_targets_text}"
            else
              scan_targets=("${manifest_digest}")
            fi

            append_summary ""
            append_summary "### ${platform_image_ref}"
            append_summary "- Quay repository: \`${quay_repository}\`"
            append_summary "- Platform: \`${platform}\`"
            append_summary "- Published tag digest: \`${manifest_digest}\`"
            append_summary "- Tag is manifest list: \`${is_manifest_list}\`"
            append_summary "- Scan target digests:"
            for scan_target in "${scan_targets[@]}"; do
              append_summary "  - \`${scan_target}\`"
              if [[ -z "${scan_target_refs[${scan_target}]+x}" ]]; then
                all_scan_targets+=("${scan_target}")
              fi
              scan_target_refs["${scan_target}"]="${platform_image_ref}"
              scan_target_repositories["${scan_target}"]="${quay_repository}"
              scan_target_statuses["${scan_target}"]="pending"
            done
          done < <(find "${refs_dir}" -type f -name '*-image-ref.json' -print | sort)
          if [[ "${env_file_count}" -eq 0 ]]; then
            fail_gate "unexpected_payload" "No published image-ref artifacts were available for Quay security evaluation."
          fi
          if [[ "${#all_scan_targets[@]}" -eq 0 ]]; then
            fail_gate "unexpected_payload" "No scan targets were collected from the published image-ref artifacts."
          fi

          poll_interval_seconds="${QUAY_SCAN_POLL_INTERVAL_SECONDS}"
          timeout_seconds="${QUAY_SCAN_TIMEOUT_SECONDS}"
          if [[ ! "${poll_interval_seconds}" =~ ^[1-9][0-9]*$ ]]; then
            fail_gate "unexpected_payload" "QUAY_SCAN_POLL_INTERVAL_SECONDS must be a positive integer."
          fi
          if [[ ! "${timeout_seconds}" =~ ^[1-9][0-9]*$ ]]; then
            fail_gate "unexpected_payload" "QUAY_SCAN_TIMEOUT_SECONDS must be a positive integer."
          fi
          max_attempts=$(( (timeout_seconds + poll_interval_seconds - 1) / poll_interval_seconds ))
          append_summary ""
          append_summary "- Quay scan poll interval: \`${poll_interval_seconds}s\`"
          append_summary "- Quay scan timeout budget: \`${timeout_seconds}s\`"

          for attempt in $(seq 1 "${max_attempts}"); do
            pending_count=0
            for scan_target in "${all_scan_targets[@]}"; do
              if [[ "${scan_target_statuses[${scan_target}]}" == "scanned" ]]; then
                continue
              fi
              platform_image_ref="${scan_target_refs[${scan_target}]}"
              quay_repository="${scan_target_repositories[${scan_target}]}"
              run_quay_api \
                "https://${{ env.QUAY_REGISTRY }}/api/v1/repository/${quay_repository}/manifest/${scan_target}/security?vulnerabilities=true" \
                "loading security status for ${platform_image_ref} (${scan_target})"
              security_response="${QUAY_API_RESPONSE}"
              scan_status="$(jq -r ".status // empty" <<< "${security_response}")"
              case "${scan_status}" in
                scanned)
                  vulnerability_count="$(
                    jq -er "[.. | .Vulnerabilities? | arrays | .[]] | length" <<< "${security_response}"
                  )" || fail_gate \
                    "unexpected_payload" \
                    "Quay scan payload for ${platform_image_ref} (${scan_target}) was missing vulnerability structure." \
                    "$(jq "." <<< "${security_response}")"
                  if [[ "${vulnerability_count}" != "0" ]]; then
                    findings_json="$(
                      jq "${scan_findings_filter}" \
                        --arg scan_target "${scan_target}" \
                        <<< "${security_response}"
                    )"
                    fail_gate \
                      "policy_failure" \
                      "Quay vulnerability policy failed for ${platform_image_ref}: ${vulnerability_count} findings on ${scan_target}." \
                      "${findings_json}"
                  fi
                  scan_target_statuses["${scan_target}"]="scanned"
                  append_summary "- Scan result for \`${scan_target}\`: passed with zero findings"
                  printf 'Quay scan passed for %s via %s with zero findings\n' "${platform_image_ref}" "${scan_target}"
                  ;;
                queued|scanning|in_progress)
                  scan_target_statuses["${scan_target}"]="${scan_status}"
                  pending_count=$((pending_count + 1))
                  printf 'Quay scan still pending for %s via %s (attempt %s, status=%s)\n' "${platform_image_ref}" "${scan_target}" "${attempt}" "${scan_status}"
                  ;;
                failed|error)
                  fail_gate \
                    "scanner_failure" \
                    "Quay reported scanner failure for ${platform_image_ref} (${scan_target}) with status ${scan_status}." \
                    "$(jq "." <<< "${security_response}")"
                  ;;
                "")
                  fail_gate \
                    "unexpected_payload" \
                    "Quay scan payload for ${platform_image_ref} (${scan_target}) was missing a status value." \
                    "$(jq "." <<< "${security_response}")"
                  ;;
                *)
                  fail_gate \
                    "unexpected_payload" \
                    "Quay scan for ${platform_image_ref} (${scan_target}) returned unexpected status ${scan_status}." \
                    "$(jq "." <<< "${security_response}")"
                  ;;
              esac
            done
            if [[ "${pending_count}" -eq 0 ]]; then
              break
            fi
            sleep "${poll_interval_seconds}"
          done

          timeout_payload="$(
            for scan_target in "${all_scan_targets[@]}"; do
              if [[ "${scan_target_statuses[${scan_target}]}" != "scanned" ]]; then
                jq -n \
                  --arg platform_image_ref "${scan_target_refs[${scan_target}]}" \
                  --arg scan_target "${scan_target}" \
                  --arg status "${scan_target_statuses[${scan_target}]}" \
                  '{platform_image_ref: $platform_image_ref, scan_target: $scan_target, status: $status}'
              fi
            done | jq -c -s "{pending_targets: .}"
          )"
          pending_target_count="$(jq -r ".pending_targets | length" <<< "${timeout_payload}")"
          if [[ "${pending_target_count}" != "0" ]]; then
            fail_gate \
              "timeout" \
              "Timed out waiting for Quay scan completion across the published Quay refs." \
              "${timeout_payload}"
          fi
          append_summary ""
          append_summary "Gate outcome: \`passed\`"
          record_outcome "passed"

      - name: Publish Quay security summary
        if: always()
        run: |
          set -euo pipefail
          summary_file="${{ runner.temp }}/quay-security-summary.md"
          if [[ -f "${summary_file}" ]]; then
            cat "${summary_file}" >> "${GITHUB_STEP_SUMMARY}"
            cat "${summary_file}"
          else
            printf '## Quay Security Gate\n\nNo summary was written.\n' | tee -a "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Enforce Quay security gate
        if: always()
        run: |
          set -euo pipefail
          gate_outcome="${{ steps.evaluate-quay-security.outputs.gate_outcome }}"
          case "${gate_outcome}" in
            passed)
              printf 'Quay security gate passed.\n'
              ;;
            policy_failure)
              printf 'Quay security gate failed because Quay surfaced vulnerability findings.\n' >&2
              exit 1
              ;;
            scanner_failure)
              printf 'Quay security gate failed because the Quay scanner or API failed.\n' >&2
              exit 1
              ;;
            timeout)
              printf 'Quay security gate timed out while waiting for Quay scan completion.\n' >&2
              exit 1
              ;;
            unexpected_payload)
              printf 'Quay security gate failed because Quay returned an unexpected payload.\n' >&2
              exit 1
              ;;
            "")
              printf 'Quay security gate failed before writing a gate outcome.\n' >&2
              exit 1
              ;;
            *)
              printf 'Quay security gate returned unknown outcome: %s\n' "${gate_outcome}" >&2
              exit 1
              ;;
          esac

  publish-manifest:
    needs:
      - audit-immutable-identities
      - quay-security-gate
      - validate-fast
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      PUBLISHED_IMAGE_MANIFEST: ${{ github.workspace }}/published-images.json
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install manifest-publish tools through Nix
        run: |
          set -euo pipefail
          nix profile install nixpkgs#jq nixpkgs#skopeo
      - name: Login to Quay for manifest publication
        env:
          QUAY_ROBOT_USERNAME: ${{ secrets.QUAY_ROBOT_USERNAME }}
          QUAY_ROBOT_PASSWORD: ${{ secrets.QUAY_ROBOT_PASSWORD }}
        run: |
          set -euo pipefail
          printf '%s' "${QUAY_ROBOT_PASSWORD}" | docker login "${{ env.QUAY_REGISTRY }}" --username "${QUAY_ROBOT_USERNAME}" --password-stdin
      - name: Download published image refs
        uses: actions/download-artifact@v8
        with:
          pattern: published-image-*
          path: ${{ runner.temp }}/published-image-refs
          merge-multiple: true
      - name: Publish multi-platform manifests and mirror them to GHCR
        env:
          GHCR_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          QUAY_ROBOT_USERNAME: ${{ secrets.QUAY_ROBOT_USERNAME }}
          QUAY_ROBOT_PASSWORD: ${{ secrets.QUAY_ROBOT_PASSWORD }}
        run: |
          set -euo pipefail
          refs_dir="${{ runner.temp }}/published-image-refs"
          test -d "${refs_dir}"
          declare -A manifest_keys=()
          declare -A ghcr_repositories=()
          declare -A final_refs=()
          declare -A amd64_refs=()
          declare -A arm64_refs=()
          image_ids=()
          while IFS= read -r ref_file; do
            ref_payload="$(cat "${ref_file}")"
            image_id="$(jq -r ".image_id" <<< "${ref_payload}")"
            ghcr_repository="$(jq -r ".ghcr_repository" <<< "${ref_payload}")"
            manifest_key="$(jq -r ".manifest_key" <<< "${ref_payload}")"
            final_image_ref="$(jq -r ".final_image_ref" <<< "${ref_payload}")"
            platform_image_ref="$(jq -r ".platform_image_ref" <<< "${ref_payload}")"
            platform="$(jq -r ".platform" <<< "${ref_payload}")"
            : "${image_id:?missing image_id}"
            : "${ghcr_repository:?missing ghcr_repository}"
            : "${manifest_key:?missing manifest_key}"
            : "${final_image_ref:?missing final_image_ref}"
            : "${platform_image_ref:?missing platform_image_ref}"
            : "${platform:?missing platform}"
            safe_image_id="${image_id//-/_}"
            if [[ -z "${manifest_keys[${safe_image_id}]+x}" ]]; then
              image_ids+=("${safe_image_id}")
            fi
            manifest_keys["${safe_image_id}"]="${manifest_key}"
            ghcr_repositories["${safe_image_id}"]="${ghcr_repository}"
            final_refs["${safe_image_id}"]="${final_image_ref}"
            case "${platform}" in
              linux/amd64)
                amd64_refs["${safe_image_id}"]="${platform_image_ref}"
                ;;
              linux/arm64)
                arm64_refs["${safe_image_id}"]="${platform_image_ref}"
                ;;
              *)
                printf 'unsupported platform for manifest publication: %s\n' "${platform}" >&2
                exit 1
                ;;
            esac
          done < <(find "${refs_dir}" -type f -name '*-image-ref.json' -print | sort)
          test "${#image_ids[@]}" -gt 0
          manifest_json='{}'
          {
            echo "## Published Multi-Platform Images"
            echo
            echo "| Image | Quay multi-platform ref | GHCR multi-platform ref |"
            echo "| --- | --- | --- |"
          } >> "${GITHUB_STEP_SUMMARY}"
          for safe_image_id in "${image_ids[@]}"; do
            manifest_key="${manifest_keys[${safe_image_id}]:?missing manifest key}"
            ghcr_repository="${ghcr_repositories[${safe_image_id}]:?missing ghcr repository}"
            final_image_ref="${final_refs[${safe_image_id}]:?missing final image ref}"
            amd64_ref="${amd64_refs[${safe_image_id}]:?missing amd64 ref}"
            arm64_ref="${arm64_refs[${safe_image_id}]:?missing arm64 ref}"
            ghcr_final_image_ref="${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${ghcr_repository}:${{ github.sha }}"
            docker manifest create "${final_image_ref}" "${amd64_ref}" "${arm64_ref}"
            docker manifest push "${final_image_ref}"
            docker manifest inspect "${final_image_ref}" >/dev/null
            skopeo copy \
              --all \
              --src-creds "${QUAY_ROBOT_USERNAME}:${QUAY_ROBOT_PASSWORD}" \
              --dest-creds "${{ github.actor }}:${GHCR_PASSWORD}" \
              "docker://${final_image_ref}" \
              "docker://${ghcr_final_image_ref}"
            skopeo inspect \
              --creds "${{ github.actor }}:${GHCR_PASSWORD}" \
              "docker://${ghcr_final_image_ref}" >/dev/null
            manifest_json="$(
              jq \
                --arg ghcr_final_image_ref "${ghcr_final_image_ref}" \
                --arg manifest_key "${manifest_key}" \
                ". + {(\$manifest_key): \$ghcr_final_image_ref}" <<< "${manifest_json}"
            )"
            printf '| %s | %s | %s |\n' \
              "\`${safe_image_id}\`" \
              "\`${final_image_ref}\`" \
              "\`${ghcr_final_image_ref}\`" >> "${GITHUB_STEP_SUMMARY}"
          done
          printf '%s\n' "${manifest_json}" > "${PUBLISHED_IMAGE_MANIFEST}"
      - name: Upload published image manifest
        uses: actions/upload-artifact@v7
        with:
          name: published-image-manifest
          path: ${{ env.PUBLISHED_IMAGE_MANIFEST }}
          if-no-files-found: error
      - name: Upload published compose artifacts
        uses: actions/upload-artifact@v7
        with:
          name: published-compose-artifacts
          path: artifacts/compose
          if-no-files-found: error
