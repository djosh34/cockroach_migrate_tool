name: publish-images

on:
  push:
    branches:
      - master

permissions:
  contents: read

env:
  GHCR_REGISTRY: ghcr.io
  QUAY_REGISTRY: quay.io
  QUAY_ORGANIZATION: ${{ vars.QUAY_ORGANIZATION }}
  RUNNER_IMAGE_REPOSITORY: ${{ vars.RUNNER_IMAGE_REPOSITORY }}
  SETUP_SQL_IMAGE_REPOSITORY: ${{ vars.SETUP_SQL_IMAGE_REPOSITORY }}
  VERIFY_IMAGE_REPOSITORY: ${{ vars.VERIFY_IMAGE_REPOSITORY }}

jobs:
  validate-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Restore Cargo registry cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
          key: validate-fast-cargo-registry-${{ runner.os }}-rust-1.93.0-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            validate-fast-cargo-registry-${{ runner.os }}-rust-1.93.0-
      - name: Restore Cargo target cache
        uses: actions/cache/restore@v5
        with:
          path: target
          key: validate-fast-target-${{ runner.os }}-rust-1.93.0-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            validate-fast-target-${{ runner.os }}-rust-1.93.0-
      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes postgresql
          postgres_bin_dir="$(dirname "$(find /usr/lib/postgresql -path '*/bin/initdb' | sort | tail -n1)")"
          test -n "${postgres_bin_dir}"
          echo "${postgres_bin_dir}" >> "${GITHUB_PATH}"
          rustup toolchain install 1.93.0 --profile minimal --component clippy
          rustup default 1.93.0
      - name: Validate fast repository lanes
        run: |
          set -euo pipefail
          make check
          make lint
          make test
      - name: Save Cargo registry cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
          key: validate-fast-cargo-registry-${{ runner.os }}-rust-1.93.0-${{ hashFiles('Cargo.lock') }}
      - name: Save Cargo target cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: target
          key: validate-fast-target-${{ runner.os }}-rust-1.93.0-${{ hashFiles('Cargo.lock') }}

  validate-long:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Restore Cargo registry cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
          key: validate-long-cargo-registry-${{ runner.os }}-rust-1.93.0-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            validate-long-cargo-registry-${{ runner.os }}-rust-1.93.0-
      - name: Restore Cargo target cache
        uses: actions/cache/restore@v5
        with:
          path: target
          key: validate-long-target-${{ runner.os }}-rust-1.93.0-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            validate-long-target-${{ runner.os }}-rust-1.93.0-
      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes postgresql
          postgres_bin_dir="$(dirname "$(find /usr/lib/postgresql -path '*/bin/initdb' | sort | tail -n1)")"
          test -n "${postgres_bin_dir}"
          echo "${postgres_bin_dir}" >> "${GITHUB_PATH}"
          rustup toolchain install 1.93.0 --profile minimal --component clippy
          rustup default 1.93.0
      - name: Validate ultra-long repository lane
        run: |
          set -euo pipefail
          make test-long
      - name: Save Cargo registry cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
          key: validate-long-cargo-registry-${{ runner.os }}-rust-1.93.0-${{ hashFiles('Cargo.lock') }}
      - name: Save Cargo target cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: target
          key: validate-long-target-${{ runner.os }}-rust-1.93.0-${{ hashFiles('Cargo.lock') }}

  publish-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    strategy:
      fail-fast: false
      matrix:
        image:
          - image_id: runner
            repository_env: RUNNER_IMAGE_REPOSITORY
            dockerfile: ./Dockerfile
            context: .
            manifest_key: runner_image_ref
            artifact_name: published-image-runner
            cache_scope: publish-image-runner
            build_kind: rust-workspace-musl
          - image_id: setup-sql
            repository_env: SETUP_SQL_IMAGE_REPOSITORY
            dockerfile: ./crates/setup-sql/Dockerfile
            context: .
            manifest_key: setup_sql_image_ref
            artifact_name: published-image-setup-sql
            cache_scope: publish-image-setup-sql
            build_kind: rust-workspace-musl
          - image_id: verify
            repository_env: VERIFY_IMAGE_REPOSITORY
            dockerfile: ./cockroachdb_molt/molt/Dockerfile
            context: ./cockroachdb_molt/molt
            manifest_key: verify_image_ref
            artifact_name: published-image-verify
            cache_scope: publish-image-verify
            build_kind: verify-go
        platform:
          - platform: linux/amd64
            runner: ubuntu-24.04
            platform_tag_suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            platform_tag_suffix: arm64
    runs-on: ${{ matrix.platform.runner }}
    env:
      PUBLISHED_IMAGE_REF_FILE: ${{ github.workspace }}/published-image-refs/${{ matrix.image.image_id }}-${{ matrix.platform.platform_tag_suffix }}-image-ref.env
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install publish dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          BUILDX_VERSION=v0.30.1
          case "${{ runner.arch }}" in
            X64)
              buildx_arch=amd64
              ;;
            ARM64)
              buildx_arch=arm64
              ;;
            *)
              printf 'unsupported runner.arch for buildx install: %s\n' "${{ runner.arch }}" >&2
              exit 1
              ;;
          esac
          mkdir -p "${HOME}/.docker/cli-plugins"
          curl -fsSL "https://github.com/docker/buildx/releases/download/${BUILDX_VERSION}/buildx-${BUILDX_VERSION}.linux-${buildx_arch}" \
            -o "${HOME}/.docker/cli-plugins/docker-buildx"
          chmod +x "${HOME}/.docker/cli-plugins/docker-buildx"
          docker buildx version
          docker buildx create \
            --name "publish-builder-${{ matrix.image.image_id }}-${{ matrix.platform.platform_tag_suffix }}" \
            --driver docker-container \
            --use
          docker buildx inspect --bootstrap
      - name: Assert native platform runner
        run: |
          set -euo pipefail
          printf 'runner.arch=%s\n' "${{ runner.arch }}"
          printf 'publish platform=%s\n' "${{ matrix.platform.platform }}"
          case "${{ runner.arch }}" in
            X64)
              expected_platform=linux/amd64
              ;;
            ARM64)
              expected_platform=linux/arm64
              ;;
            *)
              printf 'unsupported runner.arch for publish lane: %s\n' "${{ runner.arch }}" >&2
              exit 1
              ;;
          esac
          test "${expected_platform}" = "${{ matrix.platform.platform }}"
      - name: Mask derived Quay publish credentials
        env:
          QUAY_ROBOT_USERNAME: ${{ secrets.QUAY_ROBOT_USERNAME }}
          QUAY_ROBOT_PASSWORD: ${{ secrets.QUAY_ROBOT_PASSWORD }}
        run: |
          set -euo pipefail
          quay_basic_auth="$(printf '%s' "${QUAY_ROBOT_USERNAME}:${QUAY_ROBOT_PASSWORD}" | base64 -w0)"
          echo "::add-mask::${quay_basic_auth}"
          printf 'Quay publish auth (masked): %s\n' "${quay_basic_auth}"
      - name: Login to Quay
        env:
          QUAY_ROBOT_USERNAME: ${{ secrets.QUAY_ROBOT_USERNAME }}
          QUAY_ROBOT_PASSWORD: ${{ secrets.QUAY_ROBOT_PASSWORD }}
        run: |
          set -euo pipefail
          printf '%s' "${QUAY_ROBOT_PASSWORD}" | docker login "${{ env.QUAY_REGISTRY }}" --username "${QUAY_ROBOT_USERNAME}" --password-stdin
      - name: Publish image
        run: |
          set -euo pipefail
          : "${QUAY_ORGANIZATION:?missing QUAY_ORGANIZATION GitHub repository variable}"
          image_repository="$(printenv "${{ matrix.image.repository_env }}")"
          : "${image_repository:?missing ${{ matrix.image.repository_env }} GitHub repository variable}"
          quay_repository="${QUAY_ORGANIZATION}/${image_repository}"
          final_image_ref="${{ env.QUAY_REGISTRY }}/${quay_repository}:${{ github.sha }}"
          platform_image_ref="${final_image_ref}-${{ matrix.platform.platform_tag_suffix }}"
          docker buildx build \
            --progress plain \
            --platform "${{ matrix.platform.platform }}" \
            --file "${{ matrix.image.dockerfile }}" \
            --cache-from "type=gha,scope=${{ matrix.image.cache_scope }}-${{ matrix.platform.platform_tag_suffix }}" \
            --cache-to "type=gha,scope=${{ matrix.image.cache_scope }}-${{ matrix.platform.platform_tag_suffix }},mode=max" \
            --tag "${platform_image_ref}" \
            --push \
            "${{ matrix.image.context }}"
          mkdir -p "$(dirname "${PUBLISHED_IMAGE_REF_FILE}")"
          {
            printf 'image_id=%s\n' "${{ matrix.image.image_id }}"
            printf 'image_repository=%s\n' "${image_repository}"
            printf 'manifest_key=%s\n' "${{ matrix.image.manifest_key }}"
            printf 'quay_repository=%s\n' "${quay_repository}"
            printf 'final_image_ref=%s\n' "${final_image_ref}"
            printf 'platform_image_ref=%s\n' "${platform_image_ref}"
            printf 'platform=%s\n' "${{ matrix.platform.platform }}"
            printf 'platform_tag_suffix=%s\n' "${{ matrix.platform.platform_tag_suffix }}"
          } > "${PUBLISHED_IMAGE_REF_FILE}"
      - name: Upload published image ref artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.image.artifact_name }}-${{ matrix.platform.platform_tag_suffix }}
          path: ${{ env.PUBLISHED_IMAGE_REF_FILE }}
          if-no-files-found: error

  quay-security-gate:
    needs:
      - validate-fast
      - validate-long
      - publish-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    steps:
      - name: Install Quay scan dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes jq
      - name: Download published image refs
        uses: actions/download-artifact@v8
        with:
          pattern: published-image-*
          path: ${{ runner.temp }}/published-image-refs
          merge-multiple: true
      - name: Evaluate Quay security gate
        id: evaluate-quay-security
        continue-on-error: true
        env:
          QUAY_ROBOT_USERNAME: ${{ secrets.QUAY_ROBOT_USERNAME }}
          QUAY_ROBOT_PASSWORD: ${{ secrets.QUAY_ROBOT_PASSWORD }}
        run: |
          set -euo pipefail
          refs_dir="${{ runner.temp }}/published-image-refs"
          test -d "${refs_dir}"
          summary_file="${{ runner.temp }}/quay-security-summary.md"
          {
            echo "## Quay Security Gate"
            echo
            echo "Raw Quay platform-tag publication completed before security evaluation began."
          } > "${summary_file}"
          netrc_file="$(mktemp)"
          trap 'rm -f "${netrc_file}"' EXIT
          chmod 600 "${netrc_file}"
          cat > "${netrc_file}" <<EOF
          machine ${{ env.QUAY_REGISTRY }}
            login ${QUAY_ROBOT_USERNAME}
            password ${QUAY_ROBOT_PASSWORD}
          EOF

          append_summary() {
            printf '%s\n' "$1" >> "${summary_file}"
          }

          append_summary_json() {
            local title="$1"
            local payload="$2"
            {
              printf '\n%s\n\n' "${title}"
              printf '```json\n%s\n```\n' "${payload}"
            } >> "${summary_file}"
          }

          record_outcome() {
            local outcome="$1"
            echo "gate_outcome=${outcome}" >> "${GITHUB_OUTPUT}"
          }

          fail_gate() {
            local outcome="$1"
            local message="$2"
            local payload="${3:-}"
            record_outcome "${outcome}"
            append_summary ""
            append_summary "Gate outcome: \`${outcome}\`"
            append_summary "${message}"
            if [[ -n "${payload}" ]]; then
              append_summary_json "Payload" "${payload}"
            fi
            printf '%s\n' "${message}" >&2
            if [[ -n "${payload}" ]]; then
              printf '%s\n' "${payload}" >&2
            fi
            exit 1
          }

          run_quay_api() {
            local url="$1"
            local description="$2"
            local response_file
            local stderr_file
            local stderr_output
            local response_output
            response_file="$(mktemp)"
            stderr_file="$(mktemp)"
            if ! curl --silent --show-error --fail --netrc-file "${netrc_file}" "${url}" > "${response_file}" 2> "${stderr_file}"; then
              stderr_output="$(cat "${stderr_file}")"
              response_output="$(cat "${response_file}")"
              rm -f "${response_file}" "${stderr_file}"
              fail_gate \
                "scanner_failure" \
                "Quay API call failed while ${description}." \
                "$(printf '%s\n%s' "${stderr_output}" "${response_output}")"
            fi
            QUAY_API_RESPONSE="$(cat "${response_file}")"
            rm -f "${response_file}" "${stderr_file}"
          }

          env_file_count=0
          while IFS= read -r env_file; do
            env_file_count=$((env_file_count + 1))
            unset image_id image_repository manifest_key quay_repository final_image_ref platform_image_ref platform platform_tag_suffix
            . "${env_file}"
            : "${quay_repository:?missing quay_repository}"
            : "${platform_image_ref:?missing platform_image_ref}"
            tag_name="${platform_image_ref##*:}"
            run_quay_api \
              "https://${{ env.QUAY_REGISTRY }}/api/v1/repository/${quay_repository}/tag/?specificTag=${tag_name}" \
              "loading tag metadata for ${platform_image_ref}"
            tag_response="${QUAY_API_RESPONSE}"
            manifest_digest="$(jq -r '.tags[0].manifest_digest // empty' <<< "${tag_response}")"
            is_manifest_list="$(jq -r '.tags[0].is_manifest_list // false' <<< "${tag_response}")"
            if [[ -z "${manifest_digest}" ]]; then
              fail_gate \
                "unexpected_payload" \
                "Quay tag metadata for ${platform_image_ref} did not include a manifest digest." \
                "$(jq '.' <<< "${tag_response}")"
            fi

            scan_targets=()
            if [[ "${is_manifest_list}" == "true" ]]; then
              run_quay_api \
                "https://${{ env.QUAY_REGISTRY }}/api/v1/repository/${quay_repository}/manifest/${manifest_digest}" \
                "loading manifest-list details for ${platform_image_ref}"
              manifest_response="${QUAY_API_RESPONSE}"
              scan_targets_text="$(
                jq -er '
                  .manifest_data
                  | fromjson
                  | .manifests[]
                  | select((.annotations["vnd.docker.reference.type"]? // "") != "attestation-manifest")
                  | select((.platform.os? // "") != "unknown")
                  | select((.platform.architecture? // "") != "unknown")
                  | .digest
                ' <<< "${manifest_response}"
              )" || fail_gate \
                "unexpected_payload" \
                "Quay manifest-list payload for ${platform_image_ref} did not expose any scanable child manifests." \
                "$(jq '.' <<< "${manifest_response}")"
              while IFS= read -r scan_target; do
                test -n "${scan_target}"
                scan_targets+=("${scan_target}")
              done <<< "${scan_targets_text}"
            else
              scan_targets=("${manifest_digest}")
            fi

            append_summary ""
            append_summary "### ${platform_image_ref}"
            append_summary "- Quay repository: \`${quay_repository}\`"
            append_summary "- Platform: \`${platform}\`"
            append_summary "- Published tag digest: \`${manifest_digest}\`"
            append_summary "- Tag is manifest list: \`${is_manifest_list}\`"
            append_summary "- Scan target digests:"
            for scan_target in "${scan_targets[@]}"; do
              append_summary "  - \`${scan_target}\`"
            done

            for scan_target in "${scan_targets[@]}"; do
              printf 'waiting for Quay scan on %s via %s\n' "${platform_image_ref}" "${scan_target}"
              scan_status=""
              security_response=""
              for attempt in $(seq 1 60); do
                run_quay_api \
                  "https://${{ env.QUAY_REGISTRY }}/api/v1/repository/${quay_repository}/manifest/${scan_target}/security?vulnerabilities=true" \
                  "loading security status for ${platform_image_ref} (${scan_target})"
                security_response="${QUAY_API_RESPONSE}"
                scan_status="$(jq -r '.status // empty' <<< "${security_response}")"
                case "${scan_status}" in
                  scanned)
                    vulnerability_count="$(
                      jq -er '[.. | .Vulnerabilities? | arrays | .[]] | length' <<< "${security_response}"
                    )" || fail_gate \
                      "unexpected_payload" \
                      "Quay scan payload for ${platform_image_ref} (${scan_target}) was missing vulnerability structure." \
                      "$(jq '.' <<< "${security_response}")"
                    if [[ "${vulnerability_count}" != "0" ]]; then
                      findings_json="$(
                        jq '
                          {
                            status,
                            scan_target: $scan_target,
                            findings: [.. | .Vulnerabilities? | arrays | .[] | {Name, Severity, FixedBy}]
                          }
                        ' \
                          --arg scan_target "${scan_target}" \
                          <<< "${security_response}"
                      )"
                      fail_gate \
                        "policy_failure" \
                        "Quay vulnerability policy failed for ${platform_image_ref}: ${vulnerability_count} findings on ${scan_target}." \
                        "${findings_json}"
                    fi
                    append_summary "- Scan result for \`${scan_target}\`: passed with zero findings"
                    printf 'Quay scan passed for %s via %s with zero findings\n' "${platform_image_ref}" "${scan_target}"
                    break
                    ;;
                  queued|scanning|in_progress)
                    printf 'Quay scan still pending for %s via %s (attempt %s, status=%s)\n' "${platform_image_ref}" "${scan_target}" "${attempt}" "${scan_status}"
                    sleep 10
                    ;;
                  failed|error)
                    fail_gate \
                      "scanner_failure" \
                      "Quay reported scanner failure for ${platform_image_ref} (${scan_target}) with status ${scan_status}." \
                      "$(jq '.' <<< "${security_response}")"
                    ;;
                  "")
                    fail_gate \
                      "unexpected_payload" \
                      "Quay scan payload for ${platform_image_ref} (${scan_target}) was missing a status value." \
                      "$(jq '.' <<< "${security_response}")"
                    ;;
                  *)
                    fail_gate \
                      "unexpected_payload" \
                      "Quay scan for ${platform_image_ref} (${scan_target}) returned unexpected status ${scan_status}." \
                      "$(jq '.' <<< "${security_response}")"
                    ;;
                esac
              done
              if [[ "${scan_status}" != "scanned" ]]; then
                fail_gate \
                  "timeout" \
                  "Timed out waiting for Quay scan completion for ${platform_image_ref} (${scan_target}); last status was ${scan_status:-<empty>}." \
                  "$(jq '.' <<< "${security_response}")"
              fi
            done
          done < <(find "${refs_dir}" -type f -name '*-image-ref.env' -print | sort)
          if [[ "${env_file_count}" -eq 0 ]]; then
            fail_gate "unexpected_payload" "No published image-ref artifacts were available for Quay security evaluation."
          fi
          append_summary ""
          append_summary "Gate outcome: \`passed\`"
          record_outcome "passed"

      - name: Publish Quay security summary
        if: always()
        run: |
          set -euo pipefail
          summary_file="${{ runner.temp }}/quay-security-summary.md"
          if [[ -f "${summary_file}" ]]; then
            cat "${summary_file}" >> "${GITHUB_STEP_SUMMARY}"
            cat "${summary_file}"
          else
            printf '## Quay Security Gate\n\nNo summary was written.\n' | tee -a "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Enforce Quay security gate
        if: always()
        run: |
          set -euo pipefail
          gate_outcome="${{ steps.evaluate-quay-security.outputs.gate_outcome }}"
          case "${gate_outcome}" in
            passed)
              printf 'Quay security gate passed.\n'
              ;;
            policy_failure)
              printf 'Quay security gate failed because Quay surfaced vulnerability findings.\n' >&2
              exit 1
              ;;
            scanner_failure)
              printf 'Quay security gate failed because the Quay scanner/API call failed.\n' >&2
              exit 1
              ;;
            timeout)
              printf 'Quay security gate failed because Quay never reached a scanned state before timeout.\n' >&2
              exit 1
              ;;
            unexpected_payload|"")
              printf 'Quay security gate failed because Quay returned an unexpected payload.\n' >&2
              exit 1
              ;;
            *)
              printf 'Quay security gate failed with unknown outcome %s.\n' "${gate_outcome}" >&2
              exit 1
              ;;
          esac

  publish-manifest:
    needs: quay-security-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    env:
      PUBLISHED_IMAGE_MANIFEST: ${{ github.workspace }}/published-images.json
    permissions:
      contents: read
      packages: write
    outputs:
      publish_manifest: ${{ steps.publish-manifest.outputs.publish_manifest }}
      runner_image_ref: ${{ steps.publish-manifest.outputs.runner_image_ref }}
      setup_sql_image_ref: ${{ steps.publish-manifest.outputs.setup_sql_image_ref }}
      verify_image_ref: ${{ steps.publish-manifest.outputs.verify_image_ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install publish dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes skopeo
          BUILDX_VERSION=v0.30.1
          case "${{ runner.arch }}" in
            X64)
              buildx_arch=amd64
              ;;
            ARM64)
              buildx_arch=arm64
              ;;
            *)
              printf 'unsupported runner.arch for buildx install: %s\n' "${{ runner.arch }}" >&2
              exit 1
              ;;
          esac
          mkdir -p "${HOME}/.docker/cli-plugins"
          curl -fsSL "https://github.com/docker/buildx/releases/download/${BUILDX_VERSION}/buildx-${BUILDX_VERSION}.linux-${buildx_arch}" \
            -o "${HOME}/.docker/cli-plugins/docker-buildx"
          chmod +x "${HOME}/.docker/cli-plugins/docker-buildx"
          docker buildx version
      - name: Mask derived GHCR publish credentials
        env:
          GHCR_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          derived_registry_auth="$(printf '%s' "${GITHUB_ACTOR}:${GHCR_PASSWORD}" | base64 -w0)"
          echo "::add-mask::${derived_registry_auth}"
          printf 'GHCR publish auth (masked): %s\n' "${derived_registry_auth}"
      - name: Login to Quay
        env:
          QUAY_ROBOT_USERNAME: ${{ secrets.QUAY_ROBOT_USERNAME }}
          QUAY_ROBOT_PASSWORD: ${{ secrets.QUAY_ROBOT_PASSWORD }}
        run: |
          set -euo pipefail
          printf '%s' "${QUAY_ROBOT_PASSWORD}" | docker login "${{ env.QUAY_REGISTRY }}" --username "${QUAY_ROBOT_USERNAME}" --password-stdin
      - name: Login to GHCR
        env:
          GHCR_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "${GHCR_PASSWORD}" | docker login "${{ env.GHCR_REGISTRY }}" --username "${{ github.actor }}" --password-stdin
      - name: Download published image refs
        uses: actions/download-artifact@v8
        with:
          pattern: published-image-*
          path: ${{ runner.temp }}/published-image-refs
          merge-multiple: true
      - name: Publish manifest
        id: publish-manifest
        run: |
          set -euo pipefail
          refs_dir="${{ runner.temp }}/published-image-refs"
          test -d "${refs_dir}"
          declare -A manifest_keys=()
          declare -A image_repositories=()
          declare -A final_refs=()
          declare -A amd64_refs=()
          declare -A arm64_refs=()
          image_ids=()
          while IFS= read -r env_file; do
            unset image_id image_repository manifest_key quay_repository final_image_ref platform_image_ref platform platform_tag_suffix
            . "${env_file}"
            : "${image_id:?missing image_id}"
            : "${image_repository:?missing image_repository}"
            : "${manifest_key:?missing manifest_key}"
            : "${final_image_ref:?missing final_image_ref}"
            : "${platform_image_ref:?missing platform_image_ref}"
            : "${platform:?missing platform}"
            safe_image_id="${image_id//-/_}"
            if [[ -z "${manifest_keys[${safe_image_id}]+x}" ]]; then
              image_ids+=("${safe_image_id}")
            fi
            manifest_keys["${safe_image_id}"]="${manifest_key}"
            image_repositories["${safe_image_id}"]="${image_repository}"
            final_refs["${safe_image_id}"]="${final_image_ref}"
            case "${platform}" in
              linux/amd64)
                amd64_refs["${safe_image_id}"]="${platform_image_ref}"
                ;;
              linux/arm64)
                arm64_refs["${safe_image_id}"]="${platform_image_ref}"
                ;;
              *)
                printf 'unexpected platform ref in artifact %s: %s\n' "${env_file}" "${platform}" >&2
                exit 1
                ;;
            esac
          done < <(find "${refs_dir}" -type f -name '*-image-ref.env' -print | sort)
          test "${#image_ids[@]}" -gt 0
          json_entries=()
          output_lines=()
          for safe_image_id in "${image_ids[@]}"; do
            manifest_key="${manifest_keys[${safe_image_id}]:?missing manifest key}"
            image_repository="${image_repositories[${safe_image_id}]:?missing image repository}"
            final_image_ref="${final_refs[${safe_image_id}]:?missing final image ref}"
            amd64_ref="${amd64_refs[${safe_image_id}]:?missing amd64 ref}"
            arm64_ref="${arm64_refs[${safe_image_id}]:?missing arm64 ref}"
            ghcr_final_image_ref="${{ env.GHCR_REGISTRY }}/${image_repository}:${{ github.sha }}"
            docker buildx imagetools create \
              --tag "${final_image_ref}" \
              "${amd64_ref}" \
              "${arm64_ref}"
            docker buildx imagetools inspect "${final_image_ref}"
            skopeo copy \
              --all \
              --src-authfile "${HOME}/.docker/config.json" \
              --dest-authfile "${HOME}/.docker/config.json" \
              "docker://${final_image_ref}" \
              "docker://${ghcr_final_image_ref}"
            skopeo inspect --authfile "${HOME}/.docker/config.json" "docker://${ghcr_final_image_ref}" >/dev/null
            json_entries+=("  \"${manifest_key}\": \"${ghcr_final_image_ref}\"")
            output_lines+=("${manifest_key}=${ghcr_final_image_ref}")
          done
          {
            printf '{\n'
            for index in "${!json_entries[@]}"; do
              if [[ "${index}" -gt 0 ]]; then
                printf ',\n'
              fi
              printf '%s' "${json_entries[${index}]}"
            done
            printf '\n}\n'
          } > "${{ env.PUBLISHED_IMAGE_MANIFEST }}"
          {
            echo "publish_manifest<<EOF"
            cat "${{ env.PUBLISHED_IMAGE_MANIFEST }}"
            echo "EOF"
            for output_line in "${output_lines[@]}"; do
              echo "${output_line}"
            done
          } >> "${GITHUB_OUTPUT}"
      - name: Upload published image manifest
        uses: actions/upload-artifact@v7
        with:
          name: published-image-manifest
          path: ${{ env.PUBLISHED_IMAGE_MANIFEST }}
          if-no-files-found: error
      - name: Upload published compose artifacts
        uses: actions/upload-artifact@v7
        with:
          name: published-compose-artifacts
          path: artifacts/compose
          if-no-files-found: error

  workflow-summary:
    needs:
      - validate-fast
      - validate-long
      - publish-image
      - quay-security-gate
      - publish-manifest
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Download published image refs
        if: needs.publish-image.result == 'success'
        uses: actions/download-artifact@v8
        with:
          pattern: published-image-*
          path: ${{ runner.temp }}/published-image-refs
          merge-multiple: true
      - name: Publish workflow summary
        run: |
          set -euo pipefail
          refs_dir="${{ runner.temp }}/published-image-refs"
          summary_file="${{ runner.temp }}/publish-workflow-summary.md"
          {
            echo "## Publish Workflow Summary"
            echo
            printf -- '- validate-fast: `%s`\n' "${{ needs.validate-fast.result }}"
            printf -- '- validate-long: `%s`\n' "${{ needs.validate-long.result }}"
            printf -- '- publish-image: `%s`\n' "${{ needs.publish-image.result }}"
            printf -- '- quay-security-gate: `%s`\n' "${{ needs.quay-security-gate.result }}"
            printf -- '- publish-manifest: `%s`\n' "${{ needs.publish-manifest.result }}"
            echo
            if [[ -d "${refs_dir}" ]]; then
              echo "### Raw Quay Refs Published Before Security Or Promotion"
              while IFS= read -r env_file; do
                unset image_id image_repository manifest_key quay_repository final_image_ref platform_image_ref platform platform_tag_suffix
                . "${env_file}"
                printf -- '- `%s` (%s)\n' "${platform_image_ref}" "${platform}"
              done < <(find "${refs_dir}" -type f -name '*-image-ref.env' -print | sort)
              echo
            else
              echo "No published image refs were available to summarize."
              echo
            fi
            if [[ "${{ needs.publish-image.result }}" == "success" && "${{ needs.quay-security-gate.result }}" != "success" ]]; then
              echo "Raw Quay publication succeeded before the security gate failed."
              printf 'Manifest/GHCR promotion did not proceed because publish-manifest=`%s`.\n' "${{ needs.publish-manifest.result }}"
            elif [[ "${{ needs.publish-manifest.result }}" == "success" ]]; then
              echo "Manifest/GHCR promotion completed after validation and Quay security checks passed."
            else
              echo "Manifest/GHCR promotion did not complete successfully."
            fi
          } > "${summary_file}"
          cat "${summary_file}" >> "${GITHUB_STEP_SUMMARY}"
          cat "${summary_file}"
