name: publish-images

on:
  push:
    branches:
      - main

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  RUNNER_IMAGE_REPOSITORY: ${{ github.repository_owner }}/cockroach-migrate-runner
  SETUP_SQL_IMAGE_REPOSITORY: ${{ github.repository_owner }}/cockroach-migrate-setup-sql
  VERIFY_IMAGE_REPOSITORY: ${{ github.repository_owner }}/cockroach-migrate-verify

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Restore Cargo registry cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
          key: validate-cargo-registry-${{ runner.os }}-rust-1.93.0-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            validate-cargo-registry-${{ runner.os }}-rust-1.93.0-
      - name: Restore Cargo target cache
        uses: actions/cache/restore@v4
        with:
          path: target
          key: validate-target-${{ runner.os }}-rust-1.93.0-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            validate-target-${{ runner.os }}-rust-1.93.0-
      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes postgresql
          postgres_bin_dir="$(dirname "$(find /usr/lib/postgresql -path '*/bin/initdb' | sort | tail -n1)")"
          test -n "${postgres_bin_dir}"
          echo "${postgres_bin_dir}" >> "${GITHUB_PATH}"
          rustup toolchain install 1.93.0 --profile minimal --component clippy
          rustup default 1.93.0
      - name: Validate repository
        run: |
          set -euo pipefail
          make check
          make test
      - name: Save Cargo registry cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
          key: validate-cargo-registry-${{ runner.os }}-rust-1.93.0-${{ hashFiles('Cargo.lock') }}
      - name: Save Cargo target cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: target
          key: validate-target-${{ runner.os }}-rust-1.93.0-${{ hashFiles('Cargo.lock') }}

  publish-image:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_id: runner
            repository_env: RUNNER_IMAGE_REPOSITORY
            dockerfile: ./Dockerfile
            context: .
            manifest_key: runner_image_ref
            artifact_name: published-image-runner
            cache_scope: publish-image-runner
            build_kind: rust-workspace-musl
          - image_id: setup-sql
            repository_env: SETUP_SQL_IMAGE_REPOSITORY
            dockerfile: ./crates/setup-sql/Dockerfile
            context: .
            manifest_key: setup_sql_image_ref
            artifact_name: published-image-setup-sql
            cache_scope: publish-image-setup-sql
            build_kind: rust-workspace-musl
          - image_id: verify
            repository_env: VERIFY_IMAGE_REPOSITORY
            dockerfile: ./cockroachdb_molt/molt/Dockerfile
            context: ./cockroachdb_molt/molt
            manifest_key: verify_image_ref
            artifact_name: published-image-verify
            cache_scope: publish-image-verify
            build_kind: verify-go
    runs-on: ubuntu-latest
    env:
      ARM64_BUILD_STRATEGY: emulated-buildx-qemu
      PUBLISHED_IMAGE_REF_FILE: ${{ runner.temp }}/${{ matrix.image_id }}-image-ref.env
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Install publish dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes binfmt-support qemu-user-static
          sudo update-binfmts --enable qemu-aarch64
          BUILDX_VERSION=v0.30.1
          mkdir -p "${HOME}/.docker/cli-plugins"
          curl -fsSL "https://github.com/docker/buildx/releases/download/${BUILDX_VERSION}/buildx-${BUILDX_VERSION}.linux-amd64" \
            -o "${HOME}/.docker/cli-plugins/docker-buildx"
          chmod +x "${HOME}/.docker/cli-plugins/docker-buildx"
          docker buildx version
          docker buildx create --name publish-builder --driver docker-container --use
          docker buildx inspect --bootstrap
      - name: Assert multi-arch builder support
        run: |
          set -euo pipefail
          buildx_platforms="$(docker buildx inspect --bootstrap | awk -F': ' '/Platforms/ { print $2 }')"
          test -n "${buildx_platforms}"
          printf 'buildx platforms: %s\n' "${buildx_platforms}"
          printf '%s\n' "${buildx_platforms}" | grep -F "linux/amd64"
          printf '%s\n' "${buildx_platforms}" | grep -F "linux/arm64"
      - name: Record arm64 strategy decision
        run: |
          set -euo pipefail
          printf 'arm64 build strategy: %s\n' "${ARM64_BUILD_STRATEGY}"
          printf '%s\n' \
            'No trusted native arm64 runner label is configured in-repo, so the workflow keeps the emulated buildx path explicit instead of pretending a native runner exists.'
          printf '%s\n' \
            'This keeps the emulated buildx path explicit while BuildKit cache reuse and parallel image publication reduce the wall-clock cost.'
      - name: Mask derived publish credentials
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          derived_registry_auth="$(printf '%s' "${GITHUB_ACTOR}:${REGISTRY_PASSWORD}" | base64 -w0)"
          echo "::add-mask::${derived_registry_auth}"
          printf 'derived registry auth (masked): %s\n' "${derived_registry_auth}"
      - name: Login to registry
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "${REGISTRY_PASSWORD}" | docker login "${{ env.REGISTRY }}" --username "${{ github.actor }}" --password-stdin
      - name: Publish image
        run: |
          set -euo pipefail
          image_repository="$(printenv "${{ matrix.repository_env }}")"
          test -n "${image_repository}"
          image_ref="${{ env.REGISTRY }}/${image_repository}:${{ github.sha }}"
          docker buildx build \
            --progress plain \
            --platform linux/amd64,linux/arm64 \
            --file "${{ matrix.dockerfile }}" \
            --cache-from "type=gha,scope=${{ matrix.cache_scope }}" \
            --cache-to "type=gha,scope=${{ matrix.cache_scope }},mode=max" \
            --tag "${image_ref}" \
            --push \
            "${{ matrix.context }}"
          printf '%s=%s\n' "${{ matrix.manifest_key }}" "${image_ref}" > "${PUBLISHED_IMAGE_REF_FILE}"
      - name: Upload published image ref artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.PUBLISHED_IMAGE_REF_FILE }}
          if-no-files-found: error

  publish-manifest:
    needs: publish-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      PUBLISHED_IMAGE_MANIFEST: ${{ github.workspace }}/published-images.json
    permissions:
      contents: read
    outputs:
      publish_manifest: ${{ steps.publish-manifest.outputs.publish_manifest }}
      runner_image_ref: ${{ steps.publish-manifest.outputs.runner_image_ref }}
      setup_sql_image_ref: ${{ steps.publish-manifest.outputs.setup_sql_image_ref }}
      verify_image_ref: ${{ steps.publish-manifest.outputs.verify_image_ref }}
    steps:
      - name: Download published image refs
        uses: actions/download-artifact@v4
        with:
          pattern: published-image-*
          path: ${{ runner.temp }}/published-image-refs
          merge-multiple: true
      - name: Publish manifest
        id: publish-manifest
        run: |
          set -euo pipefail
          refs_dir="${{ runner.temp }}/published-image-refs"
          test -d "${refs_dir}"
          find "${refs_dir}" -type f -name '*-image-ref.env' -print | sort | while read -r env_file; do
            . "${env_file}"
          done
          . "${refs_dir}/runner-image-ref.env"
          . "${refs_dir}/setup-sql-image-ref.env"
          . "${refs_dir}/verify-image-ref.env"
          : "${runner_image_ref:?missing runner_image_ref}"
          : "${setup_sql_image_ref:?missing setup_sql_image_ref}"
          : "${verify_image_ref:?missing verify_image_ref}"
          cat > "${{ env.PUBLISHED_IMAGE_MANIFEST }}" <<EOF
          {
            "runner_image_ref": "${runner_image_ref}",
            "setup_sql_image_ref": "${setup_sql_image_ref}",
            "verify_image_ref": "${verify_image_ref}"
          }
          EOF
          {
            echo "publish_manifest<<EOF"
            cat "${{ env.PUBLISHED_IMAGE_MANIFEST }}"
            echo "EOF"
            echo "runner_image_ref=${runner_image_ref}"
            echo "setup_sql_image_ref=${setup_sql_image_ref}"
            echo "verify_image_ref=${verify_image_ref}"
          } >> "${GITHUB_OUTPUT}"
      - name: Upload published image manifest
        uses: actions/upload-artifact@v4
        with:
          name: published-image-manifest
          path: ${{ env.PUBLISHED_IMAGE_MANIFEST }}
          if-no-files-found: error
