name: master-image

env:
  REGISTRY: ghcr.io
  RUNNER_IMAGE_REPOSITORY: ${{ github.repository_owner }}/cockroach-migrate-runner
  SOURCE_BOOTSTRAP_IMAGE_REPOSITORY: ${{ github.repository_owner }}/cockroach-migrate-source-bootstrap
  RUNNER_RELEASE_IMAGE_ARCHIVE: ${{ runner.temp }}/runner-release-image.tar
  SOURCE_BOOTSTRAP_RELEASE_IMAGE_ARCHIVE: ${{ runner.temp }}/source-bootstrap-release-image.tar
  RUNNER_VULNERABILITY_REPORT: ${{ runner.temp }}/runner-vulnerability-report.txt
  SOURCE_BOOTSTRAP_VULNERABILITY_REPORT: ${{ runner.temp }}/source-bootstrap-vulnerability-report.txt

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
      - run: make check
      - run: make test
      - run: make test-long
  publish:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build runner release image archive
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          outputs: type=docker,dest=${{ env.RUNNER_RELEASE_IMAGE_ARCHIVE }}
          tags: ${{ env.REGISTRY }}/${{ env.RUNNER_IMAGE_REPOSITORY }}:${{ github.sha }}
      - name: Build source-bootstrap release image archive
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./crates/source-bootstrap/Dockerfile
          push: false
          outputs: type=docker,dest=${{ env.SOURCE_BOOTSTRAP_RELEASE_IMAGE_ARCHIVE }}
          tags: ${{ env.REGISTRY }}/${{ env.SOURCE_BOOTSTRAP_IMAGE_REPOSITORY }}:${{ github.sha }}
      - uses: aquasecurity/setup-trivy@v0.2.4
      - name: Scan runner release image archive
        run: trivy image --input "${{ env.RUNNER_RELEASE_IMAGE_ARCHIVE }}" --severity HIGH,CRITICAL --exit-code 1 --format table --output "${{ env.RUNNER_VULNERABILITY_REPORT }}"
      - name: Scan source-bootstrap release image archive
        run: trivy image --input "${{ env.SOURCE_BOOTSTRAP_RELEASE_IMAGE_ARCHIVE }}" --severity HIGH,CRITICAL --exit-code 1 --format table --output "${{ env.SOURCE_BOOTSTRAP_VULNERABILITY_REPORT }}"
      - name: Print runner vulnerability report
        if: always()
        run: |
          test -f "${{ env.RUNNER_VULNERABILITY_REPORT }}"
          cat "${{ env.RUNNER_VULNERABILITY_REPORT }}"
      - name: Print source-bootstrap vulnerability report
        if: always()
        run: |
          test -f "${{ env.SOURCE_BOOTSTRAP_VULNERABILITY_REPORT }}"
          cat "${{ env.SOURCE_BOOTSTRAP_VULNERABILITY_REPORT }}"
      - name: Upload runner vulnerability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runner-release-image-vulnerability-report
          path: ${{ env.RUNNER_VULNERABILITY_REPORT }}
          if-no-files-found: error
      - name: Upload source-bootstrap vulnerability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-bootstrap-release-image-vulnerability-report
          path: ${{ env.SOURCE_BOOTSTRAP_VULNERABILITY_REPORT }}
          if-no-files-found: error
      - name: Load scanned runner release image archive
        run: docker load --input "${{ env.RUNNER_RELEASE_IMAGE_ARCHIVE }}"
      - name: Load scanned source-bootstrap release image archive
        run: docker load --input "${{ env.SOURCE_BOOTSTRAP_RELEASE_IMAGE_ARCHIVE }}"
      - name: Push scanned runner image
        run: docker push "${{ env.REGISTRY }}/${{ env.RUNNER_IMAGE_REPOSITORY }}:${{ github.sha }}"
      - name: Push scanned source-bootstrap image
        run: docker push "${{ env.REGISTRY }}/${{ env.SOURCE_BOOTSTRAP_IMAGE_REPOSITORY }}:${{ github.sha }}"
