name: master-image

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: ${{ github.repository_owner }}/cockroach-migrate-runner
  RELEASE_IMAGE_ARCHIVE: ${{ runner.temp }}/release-image.tar
  VULNERABILITY_REPORT: ${{ runner.temp }}/vulnerability-report.txt

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
      - run: make check
      - run: make test
      - run: make test-long
  publish:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          outputs: type=docker,dest=${{ env.RELEASE_IMAGE_ARCHIVE }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}
      - uses: aquasecurity/setup-trivy@v0.2.4
      - name: Scan release image archive
        run: trivy image --input "${{ env.RELEASE_IMAGE_ARCHIVE }}" --severity HIGH,CRITICAL --exit-code 1 --format table --output "${{ env.VULNERABILITY_REPORT }}"
      - name: Print vulnerability report
        if: always()
        run: |
          test -f "${{ env.VULNERABILITY_REPORT }}"
          cat "${{ env.VULNERABILITY_REPORT }}"
      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-image-vulnerability-report
          path: ${{ env.VULNERABILITY_REPORT }}
          if-no-files-found: error
      - name: Load scanned release image archive
        run: docker load --input "${{ env.RELEASE_IMAGE_ARCHIVE }}"
      - name: Push scanned release image
        run: docker push "${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}"
